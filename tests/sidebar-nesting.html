<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sidebar Nesting & Hierarchy — unit tests</title>
</head>
<body>
<script>
/**
 * Pure logic for sidebar tests:
 *
 *  (a) `__nested` — recursive nested-goal rendering rules (parent → child goals
 *      via parentGoalId), extracted from src/app/render-helpers.ts (Phase 1
 *      task 1.5). Drives depth-cap, descendant counting, and the n/m count
 *      badge.
 *
 *  (b) `__hierarchy` — session-to-goal-group categorization for the sidebar
 *      tree (mirrors getSidebarData + renderGoalGroup from src/app/state.ts
 *      and src/app/render-helpers.ts). Drives team-goal grouping, delegate
 *      nesting under parent sessions, archived visibility, and staff section.
 *
 * Both fixtures stay pure (no DOM, no lit, no state) so we can drive them
 * with synthetic trees and assert on structural decisions the renderer makes.
 *
 * Consolidates the previous tests/sidebar-hierarchy.html fixture into one
 * place — see `docs/design/cleanup-review.md` Major #2 (F6b) and the F7
 * follow-up task that ported the SB-00 cases into sidebar-nesting.spec.ts.
 */

// ---------------------------------------------------------------------------
// (a) Nested-goal helpers (parent → child goals via parentGoalId)
// ---------------------------------------------------------------------------

const MAX_GOAL_DEPTH = 5;

/** Immediate non-archived child goals of `parentId`, sorted by createdAt ASC. */
function getChildGoalsFrom(parentId, goals) {
  return goals
    .filter(g => g.parentGoalId === parentId && !g.archived)
    .slice()
    .sort((a, b) => a.createdAt - b.createdAt);
}

/** Immediate ARCHIVED child goals of `parentId`, sorted by createdAt ASC. */
function getArchivedChildGoalsFrom(parentId, goals) {
  return goals
    .filter(g => g.parentGoalId === parentId && !!g.archived)
    .slice()
    .sort((a, b) => a.createdAt - b.createdAt);
}

/** Count all transitive non-archived descendants of `goalId`. Cycle-safe. */
function countDescendantsFrom(goalId, goals) {
  const byParent = new Map();
  for (const g of goals) {
    if (g.archived) continue;
    if (!g.parentGoalId) continue;
    let arr = byParent.get(g.parentGoalId);
    if (!arr) { arr = []; byParent.set(g.parentGoalId, arr); }
    arr.push(g);
  }
  const seen = new Set();
  let count = 0;
  const stack = [goalId];
  while (stack.length > 0) {
    const id = stack.pop();
    const kids = byParent.get(id);
    if (!kids) continue;
    for (const k of kids) {
      if (seen.has(k.id)) continue;
      seen.add(k.id);
      count++;
      stack.push(k.id);
    }
  }
  return count;
}

/** Compute the n/m count badge for a goal that has child goals. */
function computeChildCountBadge(parentId, goals) {
  const children = getChildGoalsFrom(parentId, goals);
  if (children.length === 0) return null;
  const complete = children.filter(c => c.state === "complete").length;
  return { complete, total: children.length, label: `${complete}/${children.length}` };
}

/**
 * Decide what `renderGoalGroup` would do for a given goal at a given depth.
 * Mirrors the structural choice in render-helpers.ts:
 *
 *   if (no children)               -> "leaf"        (no recursion, no "show more")
 *   else if (depth >= MAX_DEPTH)   -> "show-more"   (link to dashboard, count = descendants)
 *   else                           -> "recurse"     (render each child via renderGoalGroup with depth+1)
 */
function decideRender(goal, depth, goals) {
  const children = getChildGoalsFrom(goal.id, goals);
  if (children.length === 0) return { kind: "leaf" };
  if (depth >= MAX_GOAL_DEPTH) {
    return { kind: "show-more", count: countDescendantsFrom(goal.id, goals) };
  }
  return { kind: "recurse", childIds: children.map(c => c.id) };
}

/** Build a chain goal-0 -> goal-1 -> goal-2 -> ... -> goal-(depth-1). */
function buildLinearChain(depth) {
  const goals = [];
  for (let i = 0; i < depth; i++) {
    goals.push({
      id: `goal-${i}`,
      title: `G${i}`,
      state: "in-progress",
      createdAt: i,
      parentGoalId: i === 0 ? undefined : `goal-${i - 1}`,
      archived: false,
    });
  }
  return goals;
}

window.MAX_GOAL_DEPTH = MAX_GOAL_DEPTH;
window.getChildGoalsFrom = getChildGoalsFrom;
window.getArchivedChildGoalsFrom = getArchivedChildGoalsFrom;
window.countDescendantsFrom = countDescendantsFrom;
window.computeChildCountBadge = computeChildCountBadge;
window.decideRender = decideRender;
window.buildLinearChain = buildLinearChain;

// ---------------------------------------------------------------------------
// (b) Session-hierarchy helpers (session → goal-group categorization)
// ---------------------------------------------------------------------------

/**
 * Determines where a session belongs in the sidebar tree.
 * Returns { section, goalId?, parentSessionId? }
 */
function categorizeSession(session, goals) {
  if (session.delegateOf) {
    return { section: "delegate", parentSessionId: session.delegateOf };
  }
  if (session.teamGoalId) {
    return { section: "team-goal", goalId: session.teamGoalId };
  }
  if (session.goalId) {
    return { section: "goal", goalId: session.goalId };
  }
  if (session.staffId) {
    return { section: "staff" };
  }
  return { section: "ungrouped" };
}

/**
 * Builds the full sidebar tree from sessions, archived sessions, and goals.
 *
 * goalGroups: array of { goal, teamLead, teamMembers, nonTeamSessions, archivedMembers }
 * ungrouped: sessions not in any goal (no delegates)
 * staff: sessions with staffId
 * archived: sessions in archived goals (when showArchived)
 *
 * Delegates are nested inside their parent — never at top level of any section.
 */
function buildSidebarTree(sessions, archivedSessions, goals, showArchived) {
  // Separate live and archived goals
  const liveGoals = goals.filter(g => !g.archived);
  const archivedGoals = goals.filter(g => g.archived);

  // Staff session IDs — in real app these come from staffList.
  // Here we detect by staffId field.
  const staffSessionIds = new Set(sessions.filter(s => s.staffId).map(s => s.id));

  // Build goal groups for live goals
  const goalGroups = liveGoals.map(goal => buildGoalGroup(goal, sessions, archivedSessions, showArchived));

  // Build archived goal groups
  const archivedGoalGroups = showArchived
    ? archivedGoals.map(goal => buildGoalGroup(goal, sessions, archivedSessions, showArchived))
    : [];

  // Ungrouped: sessions without goalId, teamGoalId, delegateOf, or staffId
  const ungrouped = sessions.filter(s =>
    !s.goalId && !s.teamGoalId && !s.delegateOf && !staffSessionIds.has(s.id)
  );

  // Staff sessions
  const staff = sessions.filter(s => staffSessionIds.has(s.id));

  return { goalGroups, archivedGoalGroups, ungrouped, staff };
}

/**
 * Build a single goal group with team lead, members, delegates nested.
 */
function buildGoalGroup(goal, sessions, archivedSessions, showArchived) {
  // Get sessions for this goal (no delegates at top level)
  const goalSessions = sessions.filter(s =>
    (s.goalId === goal.id || s.teamGoalId === goal.id) && !s.delegateOf
  );

  const isTeamGoal = !!goal.team;
  const teamLead = isTeamGoal ? goalSessions.find(s => s.role === "team-lead") : null;
  const teamMembers = isTeamGoal && teamLead
    ? goalSessions.filter(s => s.id !== teamLead.id)
    : [];
  const nonTeamSessions = isTeamGoal ? [] : goalSessions;

  // Archived members (non-delegates, non-leads) for the live lead
  const archivedMembers = showArchived && teamLead
    ? archivedSessions.filter(s =>
        s.teamGoalId === goal.id && !s.delegateOf &&
        s.role !== "team-lead" && s.teamLeadSessionId === teamLead.id
      )
    : [];

  // Get all delegates for each session (recursive)
  const getDelegates = (parentId) => {
    const liveDelegates = sessions.filter(s => s.delegateOf === parentId);
    const archivedDels = showArchived
      ? archivedSessions.filter(s => s.delegateOf === parentId)
      : [];
    return [...liveDelegates, ...archivedDels].map(d => ({
      ...d,
      delegates: getDelegates(d.id)
    }));
  };

  // Attach delegates to each session
  const withDelegates = (s) => ({
    ...s,
    delegates: getDelegates(s.id)
  });

  return {
    goal,
    teamLead: teamLead ? withDelegates(teamLead) : null,
    teamMembers: teamMembers.map(withDelegates),
    nonTeamSessions: nonTeamSessions.map(withDelegates),
    archivedMembers: archivedMembers.map(withDelegates),
  };
}

/**
 * Flatten a goal group into a list of visible session IDs
 * (top-level sessions only, delegates listed under their parent).
 */
function getVisibleSessionIds(tree, showArchived) {
  const ids = [];

  const collectDelegateIds = (delegates) => {
    for (const d of delegates) {
      ids.push(d.id);
      if (d.delegates) collectDelegateIds(d.delegates);
    }
  };

  const collectFromGoalGroup = (group) => {
    if (group.teamLead) {
      ids.push(group.teamLead.id);
      collectDelegateIds(group.teamLead.delegates || []);
      for (const m of group.teamMembers) {
        ids.push(m.id);
        collectDelegateIds(m.delegates || []);
      }
      for (const m of group.archivedMembers) {
        ids.push(m.id);
        collectDelegateIds(m.delegates || []);
      }
    }
    for (const s of group.nonTeamSessions) {
      ids.push(s.id);
      collectDelegateIds(s.delegates || []);
    }
  };

  for (const group of tree.goalGroups) {
    collectFromGoalGroup(group);
  }

  if (showArchived) {
    for (const group of tree.archivedGoalGroups) {
      collectFromGoalGroup(group);
    }
  }

  for (const s of tree.ungrouped) {
    ids.push(s.id);
  }

  for (const s of tree.staff) {
    ids.push(s.id);
  }

  return ids;
}

/**
 * Check whether a session ID appears as a top-level entry in any section
 * (i.e., NOT nested as a delegate).
 */
function isTopLevel(tree, sessionId) {
  const topLevelIds = new Set();

  for (const group of [...tree.goalGroups, ...tree.archivedGoalGroups]) {
    if (group.teamLead) topLevelIds.add(group.teamLead.id);
    for (const m of group.teamMembers) topLevelIds.add(m.id);
    for (const s of group.nonTeamSessions) topLevelIds.add(s.id);
    for (const m of group.archivedMembers) topLevelIds.add(m.id);
  }
  for (const s of tree.ungrouped) topLevelIds.add(s.id);
  for (const s of tree.staff) topLevelIds.add(s.id);

  return topLevelIds.has(sessionId);
}

window.__hierarchy = {
  categorizeSession,
  buildSidebarTree,
  getVisibleSessionIds,
  isTopLevel,
};
</script>
</body>
</html>
