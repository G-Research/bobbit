<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Command History Test Fixture</title>
</head>
<body>
<textarea id="editor" rows="4" cols="40"></textarea>
<div id="state-display"></div>

<script>
// Replicates MessageEditor command history state machine (in-memory, no IndexedDB)
let history = [];
let historyIndex = -1; // -1 = not browsing
let savedDraft = '';

function setHistory(entries) {
  history = entries.slice();
  historyIndex = -1;
  savedDraft = '';
}

function getState() {
  return {
    historyIndex: historyIndex,
    savedDraft: savedDraft,
    textareaValue: document.getElementById('editor').value
  };
}

function isCursorOnFirstLine() {
  const ta = document.getElementById('editor');
  const pos = ta.selectionStart;
  return ta.value.lastIndexOf('\n', pos - 1) === -1;
}

document.getElementById('editor').addEventListener('keydown', function(e) {
  const ta = document.getElementById('editor');

  if (e.key === 'ArrowUp' && history.length > 0 && isCursorOnFirstLine()) {
    e.preventDefault();
    if (historyIndex === -1) {
      // First press — save current text as draft, show newest entry
      savedDraft = ta.value;
      historyIndex = history.length - 1;
    } else if (historyIndex > 0) {
      historyIndex--;
    } else {
      // Already at oldest — stay
      return;
    }
    ta.value = history[historyIndex];
    ta.setSelectionRange(0, 0);
  } else if (e.key === 'ArrowDown' && historyIndex !== -1) {
    e.preventDefault();
    if (historyIndex < history.length - 1) {
      historyIndex++;
      ta.value = history[historyIndex];
      ta.setSelectionRange(ta.value.length, ta.value.length);
    } else {
      // Past the end — restore saved draft
      historyIndex = -1;
      ta.value = savedDraft;
      ta.setSelectionRange(ta.value.length, ta.value.length);
    }
  }
});

// ── CommandHistoryStore mock (replicates real dedup logic from command-history-store.ts) ──
// Uses in-memory Map instead of IndexedDB, but the addEntry/getHistory logic is identical.
const storeData = new Map(); // key → { id, sessionId, text, timestamp }

const historyStore = {
  async addEntry(sid, text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    const prefix = sid + ':';
    const entries = [];
    for (const [k, v] of storeData) {
      if (k.startsWith(prefix)) entries.push(v);
    }
    entries.sort((a, b) => a.timestamp - b.timestamp);
    // Skip if the most recent entry is identical (consecutive dedup)
    if (entries.length > 0 && entries[entries.length - 1].text === trimmed) {
      return;
    }
    const timestamp = Date.now();
    const entry = { id: `${sid}:${timestamp}`, sessionId: sid, text: trimmed, timestamp };
    storeData.set(entry.id, entry);
  },

  async getHistory(sid) {
    const prefix = sid + ':';
    const entries = [];
    for (const [k, v] of storeData) {
      if (k.startsWith(prefix)) entries.push(v);
    }
    entries.sort((a, b) => a.timestamp - b.timestamp);
    return entries.map(e => e.text);
  },

  async clearHistory(sid) {
    const prefix = sid + ':';
    for (const k of storeData.keys()) {
      if (k.startsWith(prefix)) storeData.delete(k);
    }
  }
};

// Expose for Playwright
window.setHistory = setHistory;
window.getState = getState;
window.historyStore = historyStore;
</script>
</body>
</html>
