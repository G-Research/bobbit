<!DOCTYPE html>
<html>
<head>
  <title>Sidebar Mission Grouping Test Fixture</title>
  <script type="module">
    // ==========================================================================
    // Mirror of getSidebarData()'s mission-aware filtering from
    // src/app/state.ts. The real implementation can't be loaded here because
    // state.ts touches localStorage at module-init and pulls in the entire
    // chat panel; this fixture replicates the shape so the test can exercise
    // it in isolation.
    // ==========================================================================

    /** Returns true if the session belongs to a mission, transitively. */
    function isMissionOwnedSession(s, goalsById) {
      if (s.missionId) return true;
      const gid = s.goalId || s.teamGoalId;
      if (gid) {
        const g = goalsById.get(gid);
        if (g && g.missionId) return true;
      }
      return false;
    }

    /**
     * Mirrors the relevant slice of getSidebarData(): build ungroupedSessions,
     * liveGoals, archivedGoals from the inputs. We don't need staff/projects
     * here — only the mission-owned filtering matters.
     */
    function buildSidebar(state) {
      const staffSessionIds = new Set(
        state.staffList.map(s => s.currentSessionId).filter(id => Boolean(id))
      );
      const goalsById = new Map(state.goals.map(g => [g.id, g]));
      const ungroupedSessions = state.gatewaySessions
        .filter(s =>
          !s.goalId && !s.teamGoalId && !s.delegateOf &&
          !staffSessionIds.has(s.id) &&
          !isMissionOwnedSession(s, goalsById)
        )
        .sort((a, b) => a.createdAt - b.createdAt);
      const sortedGoals = [...state.goals].sort((a, b) => a.createdAt - b.createdAt);
      const liveGoals = sortedGoals.filter(g => !g.archived && !g.missionId);
      const archivedGoals = sortedGoals.filter(g => g.archived && !g.missionId);
      const liveMissions = state.missions.filter(m => !m.archived);
      return { ungroupedSessions, liveGoals, archivedGoals, liveMissions };
    }

    /**
     * Mirror of renderMissionGroup()'s computation of the rows that belong
     * directly under a mission: the Commander session + any other
     * mission-direct sessions (e.g. mission-gate reviewer sub-sessions). Used
     * by the sidebar test to assert reviewer rows are re-injected under the
     * mission after the project-level Sessions filter excludes them.
     */
    function missionDirectSessions(state, mission) {
      const sessions = state.gatewaySessions || [];
      const commander = mission.commanderSessionId
        ? sessions.find(s => s.id === mission.commanderSessionId)
        : undefined;
      const others = sessions
        .filter(s =>
          s.missionId === mission.id
          && s.id !== mission.commanderSessionId
          && !s.archived
          && !s.teamGoalId
        )
        .sort((a, b) => {
          const aActive = a.status === "streaming" || a.status === "busy" || a.isCompacting;
          const bActive = b.status === "streaming" || b.status === "busy" || b.isCompacting;
          if (aActive !== bActive) return aActive ? -1 : 1;
          return (b.lastActivity ?? 0) - (a.lastActivity ?? 0);
        });
      return { commander, otherMissionSessions: others };
    }

    window.__missionGrouping = { isMissionOwnedSession, buildSidebar, missionDirectSessions };
  </script>
</head>
<body>
  <h1>Sidebar Mission Grouping Test Fixture</h1>
  <p>This fixture is exercised by tests/sidebar-mission-grouping.spec.ts.</p>
</body>
</html>
