<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  .container { width: 100%; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .overflow-y-auto {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    overflow-anchor: none;
  }
  .max-w-5xl { max-width: 64rem; margin: 0 auto; padding: 8px; }
  .message { padding: 16px; margin: 8px; background: #f0f0f0; border-radius: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="overflow-y-auto" id="scroll-container">
    <div class="max-w-5xl" id="content"></div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Behavioural twin of the post-redesign scroll logic in
// src/ui/components/AgentInterface.ts. Implements the four-rule model:
//
//   1. _stickToBottom is mutated FALSE only by user-gesture listeners
//      (wheel / touchstart / keydown of nav keys), and TRUE only by
//      programmatic restore points.
//   2. Geometry NEVER mutates _stickToBottom; _handleScroll only updates
//      jump-button visibility.
//   3. Programmatic-scroll echoes go through a small ring buffer (length 4);
//      _handleScroll consumes the OLDEST matching entry within < 1 px.
//   4. RO callback re-pins via _pinIfSticking() on delta > 0; delta === 0
//      is a no-op (the canonical vibration regression).
// ---------------------------------------------------------------------------
const scrollContainer = document.getElementById('scroll-container');
const content = document.getElementById('content');

for (let i = 0; i < 200; i++) {
  const div = document.createElement('div');
  div.className = 'message';
  div.textContent = `Message ${i + 1}: lorem ipsum dolor sit amet, consectetur adipiscing elit.`;
  content.appendChild(div);
}

let _stickToBottom = true;
let _programmaticEchoes = []; // ring buffer (length 4)
let _lastScrollHeight = scrollContainer.scrollHeight;
let _showJumpToBottom = false;
let _scrollToBottomCallCount = 0;

function _pushEcho(top, height) {
  if (_programmaticEchoes.length >= 4) _programmaticEchoes.shift();
  _programmaticEchoes.push({ top, height });
}

function _pinIfSticking() {
  if (!_stickToBottom) return;
  const sh = scrollContainer.scrollHeight;
  const target = sh - scrollContainer.clientHeight;
  if (Math.abs(scrollContainer.scrollTop - target) < 1) return;
  _scrollToBottomCallCount++;
  _pushEcho(target, sh);
  scrollContainer.scrollTop = sh;
}

// Mirrors the production _handleScroll (post-redesign).
function _handleScroll() {
  const { scrollTop, scrollHeight, clientHeight } = scrollContainer;
  for (let i = 0; i < _programmaticEchoes.length; i++) {
    const e = _programmaticEchoes[i];
    if (Math.abs(scrollTop - e.top) < 1 && Math.abs(scrollHeight - e.height) < 1) {
      _programmaticEchoes.splice(i, 1);
      return;
    }
  }
  // Geometry: jump-button visibility only. Never mutates _stickToBottom.
  _showJumpToBottom = scrollHeight - scrollTop - clientHeight > clientHeight * 0.5;
}

function _handleUserIntent() {
  _stickToBottom = false;
}

function _handleScrollKeydown(e) {
  switch (e.key) {
    case "PageUp":
    case "ArrowUp":
    case "Home":
    case "PageDown":
    case "ArrowDown":
    case "End":
      _stickToBottom = false;
      break;
  }
}

// Mirrors the ResizeObserver callback (post-redesign).
function _resizeObserverCallback() {
  const newScrollHeight = scrollContainer.scrollHeight;
  const delta = newScrollHeight - _lastScrollHeight;
  if (delta < 0) { _lastScrollHeight = newScrollHeight; return; }
  if (delta === 0) return;
  _lastScrollHeight = newScrollHeight;
  _pinIfSticking();
}

// --- Test hooks -------------------------------------------------------------

window.__startAtBottom = () => {
  scrollContainer.scrollTop = scrollContainer.scrollHeight;
  _lastScrollHeight = scrollContainer.scrollHeight;
  _stickToBottom = true;
  _programmaticEchoes = [];
  _showJumpToBottom = false;
  _scrollToBottomCallCount = 0;
};

window.__getState = () => ({
  scrollTop: scrollContainer.scrollTop,
  scrollHeight: scrollContainer.scrollHeight,
  clientHeight: scrollContainer.clientHeight,
  stickToBottom: _stickToBottom,
  echoCount: _programmaticEchoes.length,
  showJumpToBottom: _showJumpToBottom,
  scrollToBottomCallCount: _scrollToBottomCallCount,
});

// Outcome 1 — sub-pixel echo absorbing.
// Pin once, then synthesise a scroll event whose reported scrollTop is the
// echo's top + 0.4 px. The < 1 px tolerance must consume it.
window.__primeProgrammaticScroll = () => {
  const sh = scrollContainer.scrollHeight;
  const target = sh - scrollContainer.clientHeight;
  scrollContainer.scrollTop = sh;
  _pushEcho(target, sh);
  _stickToBottom = true;
};

window.__simulateFractionalEcho = () => {
  // Shift the head of the ring buffer's `top` by -0.4 so the live scrollTop
  // reads as +0.4 from the handler's perspective.
  if (_programmaticEchoes.length > 0) {
    _programmaticEchoes[0] = {
      top: _programmaticEchoes[0].top - 0.4,
      height: _programmaticEchoes[0].height,
    };
  }
  _handleScroll();
};

// Outcome 2 — 10-px tail equivalent. With the redesign, geometry never
// mutates _stickToBottom; the user can be inside or outside the tail
// without the flag changing. The test below asserts that.
window.__scrollSoDistanceFromBottomIs = (n) => {
  const target = scrollContainer.scrollHeight - scrollContainer.clientHeight - n;
  scrollContainer.scrollTop = target;
  _handleScroll();
};

// Outcome 3 — programmatic restore from state_update equivalent. Server
// snapshot lands → caller invokes _pinIfSticking; if _stickToBottom is true,
// viewport is at the bottom afterward.
window.__appendMessages = (n) => {
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'message';
    d.textContent = 'Late message ' + i;
    content.appendChild(d);
  }
};

window.__fireResizeObserver = () => _resizeObserverCallback();

window.__pinIfSticking = () => _pinIfSticking();

window.__fireUserWheel = () => _handleUserIntent();

window.__fireScrollKey = (key) => _handleScrollKeydown({ key });

// Multi-write echo race: push two programmatic writes back-to-back, then
// fire the older echo first. The ring buffer must consume the oldest matching
// entry; _stickToBottom must remain unchanged (geometry never mutates it).
window.__simulateMultiWriteRace = () => {
  // Two programmatic writes (older then newer).
  const sh1 = scrollContainer.scrollHeight;
  const target1 = sh1 - scrollContainer.clientHeight;
  _pushEcho(target1, sh1);
  // Append content, then a second pin (newer).
  const d = document.createElement('div');
  d.className = 'message';
  d.style.height = '60px';
  content.appendChild(d);
  const sh2 = scrollContainer.scrollHeight;
  const target2 = sh2 - scrollContainer.clientHeight;
  _pushEcho(target2, sh2);
  scrollContainer.scrollTop = sh2;
  // Fire the OLDER echo (browser delivers a stale scroll event with the
  // first pair). Single-pair latch would have lost it; ring must absorb it.
  scrollContainer.scrollTop = target1;
  // Hack: temporarily report the older height so the handler sees the first
  // entry as a match. We do this by faking via a synthetic call.
  const observed = { scrollTop: target1, scrollHeight: sh1, clientHeight: scrollContainer.clientHeight };
  // Manually scan ring (deterministic equivalent of _handleScroll):
  for (let i = 0; i < _programmaticEchoes.length; i++) {
    const e = _programmaticEchoes[i];
    if (Math.abs(observed.scrollTop - e.top) < 1 && Math.abs(observed.scrollHeight - e.height) < 1) {
      _programmaticEchoes.splice(i, 1);
      return;
    }
  }
};
</script>
</body>
</html>
