<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>markdown-throttle test</title>
</head>
<body>
  <div id="container"></div>
  <script src="./markdown-throttle-bundle.js"></script>
  <script>
    // Wait for custom elements to be defined, then signal readiness
    Promise.all([
      customElements.whenDefined('assistant-message'),
      customElements.whenDefined('markdown-block'),

      window.__ready = true;
    });
  </script>
