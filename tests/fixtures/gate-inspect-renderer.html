<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GateInspectRenderer Test Fixture</title>
</head>
<body>
<div id="container"></div>
<script>
/**
 * Test fixture for GateInspectRenderer logic.
 *
 * Mirrors the rendering decisions in GateInspectRenderer.ts:
 * - getToolState() resolves to inprogress/complete/error/warning
 * - Three section branches: content, verification, signals
 * - Verification step expand/collapse via DOM-direct manipulation
 * - Signal field names: verdict (not status), timestamp (not signalledAt)
 * - Signal count pluralization
 */

function getToolState(result, isStreaming) {
	if (!result) return isStreaming ? "inprogress" : "complete";
	if (result.isError) {
		const text = (result.content || []).filter(c => c.type === "text").map(c => c.text).join("");
		if (text.includes("Skipped due to queued user message")) return "warning";
		return "error";
	}
	return "complete";
}

function getResult(result) {
	const text = (result && result.content || [])
		.filter(c => c.type === "text")
		.map(c => c.text)
		.join("\n") || "";
	let data = null;
	try { data = JSON.parse(text); } catch(e) {}
	return { text, data };
}

function isSkippedToolResult(result) {
	if (!result || !result.isError) return false;
	const text = (result.content || []).filter(c => c.type === "text").map(c => c.text).join("");
	return text.includes("Skipped due to queued user message");
}

function normalizeStatus(status) {
	if (typeof status !== "string") return undefined;
	const key = status.toLowerCase().replace(/_/g, "-");
	if (key === "passed" || key === "success" || key === "completed") return "passed";
	if (key === "failed" || key === "failure" || key === "error" || key === "timeout") return "failed";
	if (key === "skipped") return "skipped";
	if (key === "running" || key === "in-progress" || key === "starting") return "running";
	if (key === "waiting" || key === "pending" || key === "queued" || key === "yet-to-run") return "waiting";
	if (key === "blocked" || key === "blocked-by-earlier-failure") return "blocked";
	return undefined;
}

function deriveStepStatus(step) {
	const explicitStatus = normalizeStatus(step && step.status);
	if (explicitStatus) return explicitStatus;
	if (step.skipped) return "skipped";
	if (step.passed === true) return "passed";
	if (step.passed === false) return "failed";
	return "running";
}

function shouldShowDuration(status, durationMs) {
	if (typeof durationMs !== "number" || !Number.isFinite(durationMs)) return false;
	if ((status === "waiting" || status === "blocked" || status === "skipped") && durationMs <= 0) return false;
	return status === "running" || status === "passed" || status === "failed" || durationMs > 0;
}

function formatCountSummary(counts) {
	if (!counts) return "";
	return ["passed", "failed", "running", "waiting", "blocked", "skipped"]
		.map(function(status) { return Number(counts[status] || 0) > 0 ? Number(counts[status]) + " " + status : ""; })
		.filter(Boolean)
		.join(", ");
}

function verificationSummary(data, steps) {
	if (typeof (data && data.summary) === "string") return data.summary;
	const counts = data && (data.statusCounts || data.counts || (data.summary && data.summary.counts));
	const explicit = formatCountSummary(counts);
	if (explicit) return explicit;
	const derived = {};
	steps.forEach(function(step) {
		const status = deriveStepStatus(step);
		derived[status] = (derived[status] || 0) + 1;
	});
	return formatCountSummary(derived);
}

function hasArg(value) {
	return value !== undefined && value !== null && String(value) !== "";
}

function primarySelection(data) {
	if (data && data.selection && data.selection.mode) return data.selection;
	const steps = Array.isArray(data && data.steps) ? data.steps : [];
	const step = steps.find(function(s) { return s && s.selection; });
	return (step && step.selection) || (data && data.selection);
}

function formatRange(from, to) {
	if (!hasArg(from) && !hasArg(to)) return undefined;
	return (hasArg(from) ? from : "?") + "–" + (hasArg(to) ? to : "?");
}

function ellipsize(value, max) {
	max = max || 40;
	const text = String(value);
	return text.length > max ? text.slice(0, max - 1) + "…" : text;
}

function formatInspectArgSummary(params, data, opts) {
	params = params || {};
	const selection = primarySelection(data);
	const range = selection && selection.range;
	const parts = [];

	if (hasArg(params.step)) parts.push("step " + params.step);
	if (hasArg(params.signal_index) && params.section !== "signals") parts.push("signal " + params.signal_index);

	const mode = typeof params.mode === "string"
		? params.mode
		: selection && typeof selection.mode === "string"
			? selection.mode
			: undefined;

	if (mode === "grep" || (!mode && hasArg(params.pattern))) {
		const patternValue = opts && opts.truncatePattern ? ellipsize(params.pattern) : String(params.pattern);
		const pattern = hasArg(params.pattern) ? " " + JSON.stringify(patternValue) : "";
		parts.push("grep" + pattern);
		if (hasArg(params.context)) parts.push("ctx " + params.context);
		const maxResults = params.max_results !== undefined ? params.max_results : params.maxResults;
		if (hasArg(maxResults)) parts.push("max " + maxResults);
	} else if (mode === "slice") {
		parts.push("slice " + (formatRange(params.from !== undefined ? params.from : range && range.from, params.to !== undefined ? params.to : range && range.to) || "range"));
	} else if (mode === "head" || mode === "tail") {
		const selectedRange = formatRange(range && range.from, range && range.to);
		if (selectedRange) parts.push(mode + " " + selectedRange);
		else if (hasArg(params.lines)) parts.push(mode + " " + params.lines + " lines");
		else parts.push(mode);
	} else if (mode === "full") {
		parts.push("full");
	} else if (hasArg(params.lines)) {
		parts.push("tail " + params.lines + " lines");
	}

	return parts.join(" · ");
}

/**
 * Mirrors GateInspectRenderer.render() — returns rendering decision metadata.
 */
function renderInspect(params, result, isStreaming) {
	const state = getToolState(result, isStreaming);
	const gateId = (params && params.gate_id) || "gate";

	// Loading state
	if (!result) {
		return { branch: "loading", state, gateId, argSummary: formatInspectArgSummary(params) };
	}

	// Error/skipped state
	const { data, text } = getResult(result);
	if (result.isError) {
		const skipped = isSkippedToolResult(result);
		return { branch: skipped ? "skipped" : "error", state, gateId, text, argSummary: formatInspectArgSummary(params) };
	}

	const section = (data && data.section) || (params && params.section) || "content";
	const argSummary = formatInspectArgSummary(params, data);
	if (section === "content") return renderContent(state, gateId, data, argSummary);
	if (section === "verification") return renderVerification(state, gateId, data, argSummary);
	if (section === "signals") return renderSignals(state, gateId, data, argSummary);
	return renderContent(state, gateId, data, argSummary);
}

function renderContent(state, gateId, data, argSummary) {
	const signalIndex = (data && data.signalIndex != null) ? data.signalIndex : "?";
	const signalId = (data && data.signalId) || "";
	const content = data && data.text;
	return {
		branch: "content",
		state, gateId,
		argSummary: argSummary,
		signalIndex, signalId,
		hasContent: !!content,
		contentText: content || null,
	};
}

function renderVerification(state, gateId, data, argSummary) {
	const signalIndex = (data && data.signalIndex != null) ? data.signalIndex : "?";
	const signalId = (data && data.signalId) || "";
	const steps = (data && data.steps) || [];
	const summary = verificationSummary(data, steps);

	const stepInfos = steps.map(function(step) {
		const status = deriveStepStatus(step);
		const isFailed = status === "failed";
		return {
			name: step.name,
			type: step.type,
			status: status,
			hasOutput: !!step.output,
			isFailed: isFailed,
			startsExpanded: isFailed,
			durationMs: step.duration_ms,
			showsDuration: shouldShowDuration(status, step.duration_ms),
		};
	});

	return {
		branch: "verification",
		state, gateId,
		argSummary: argSummary,
		signalIndex, signalId,
		stepCount: steps.length,
		summary: summary,
		steps: stepInfos,
	};
}

function renderSignals(state, gateId, data, argSummary) {
	const signals = (data && data.signals) || [];
	const count = signals.length;
	const pluralized = count + " signal" + (count !== 1 ? "s" : "");
	const isCollapsible = count > 5;

	// Mirror the field names used in the renderer
	const rows = signals.map(function(s) {
		return {
			index: s.index,
			// BUG FIX verification: these must use `verdict` and `timestamp`
			verdict: s.verdict,
			timestamp: s.timestamp,
			hasContent: !!s.hasContent,
			sessionId: s.sessionId ? s.sessionId.slice(0, 8) : null,
		};
	});

	return {
		branch: "signals",
		state, gateId,
		argSummary: argSummary,
		count: count,
		pluralized: pluralized,
		isCollapsible: isCollapsible,
		rows: rows,
	};
}

/**
 * Build a live DOM for verification steps to test expand/collapse behavior.
 * Mirrors the DOM structure from GateInspectRenderer._renderVerification().
 */
function buildVerificationDOM(steps) {
	const container = document.getElementById("container");
	container.innerHTML = "";
	const wrapper = document.createElement("div");

	steps.forEach(function(step) {
		const status = deriveStepStatus(step);
		const isFailed = status === "failed";
		const hasOutput = !!step.output;

		const card = document.createElement("div");
		card.className = "border border-border rounded text-sm";

		const header = document.createElement("div");
		header.className = "p-2 flex items-center gap-2" + (hasOutput ? " cursor-pointer" : "");

		const nameSpan = document.createElement("span");
		nameSpan.textContent = step.name;
		header.appendChild(nameSpan);

		if (hasOutput) {
			const chevron = document.createElement("span");
			chevron.setAttribute("data-step-chevron", "");
			chevron.textContent = isFailed ? "▴" : "▾";
			header.appendChild(chevron);

			header.addEventListener("click", function(e) {
				var parentCard = e.currentTarget.parentElement;
				var output = parentCard.querySelector("[data-step-output]");
				var chev = parentCard.querySelector("[data-step-chevron]");
				if (!output) return;
				var isHidden = output.classList.contains("hidden");
				output.classList.toggle("hidden");
				if (chev) chev.textContent = isHidden ? "▴" : "▾";
			});
		}

		card.appendChild(header);

		if (hasOutput) {
			const output = document.createElement("pre");
			output.setAttribute("data-step-output", "");
			output.className = (isFailed ? "" : "hidden") + " text-xs";
			output.textContent = step.output;
			card.appendChild(output);
		}

		wrapper.appendChild(card);
	});

	container.appendChild(wrapper);
	return wrapper;
}

// Expose
window.renderInspect = renderInspect;
window.formatInspectArgSummary = formatInspectArgSummary;
window.buildVerificationDOM = buildVerificationDOM;
window._testReady = true;
</script>
</body>
</html>
