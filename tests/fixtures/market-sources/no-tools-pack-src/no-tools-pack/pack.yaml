name: no-tools-pack
description: >-
  V1-schema litmus — an ORPHAN / UI-only pack with NO tools. It declares only
  pack-scoped contributions: an auto-discovered panel, two entrypoints (a
  launcher + a kind:"route" deep-link), and pack-level routes. Proves a pack
  with contents.tools:[] installs and registers panels/entrypoints/routes, and
  drives the pack-bound surface auth path (no tool in allowedTools).
version: 1.0.0
contents:
  roles: []
  tools: []
  skills: []
  entrypoints:
    - open
    - deeplink
routes:
  module: lib/routes.mjs
  names: [ping]
