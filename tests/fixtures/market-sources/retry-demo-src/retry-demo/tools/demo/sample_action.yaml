name: sample_action
description: A demo tool with a Retry button wired to a server action handler.
group: Demo
summary: Demo tool — renders a Retry button wired to a server action.
# Phase-1 load-bearing contributions (design docs/design/extension-host.md §2.4):
#  - renderer: a pre-built ESM module served to the browser + lazily imported.
#  - actions:  a server actions module loaded by the gateway. It MUST be ESM-
#    loadable under plain node, so it is named `.mjs` (a `.js` with `export` and
#    no package.json would load as CJS and fail) — see Wave 2B integration note.
#
# NOTE (FINDING #1 — Wave 1/2 integration bug, see spec header): the design §2.4
# example pack tool declares NO `provider:`. But the renderer endpoint and the
# ActionDispatcher resolve the tool via ToolManager.getToolProviders(), which
# only includes tools that declare a `provider:` (tool-manager.ts:623,
# `if (tool.provider) map.set(...)`). Without this block the renderer endpoint
# 404s ("no pack renderer for this tool") and the action 404s. This `provider:`
# is therefore a WORKAROUND, not litmus-required authoring — remove it to
# reproduce finding #1.
provider:
  type: bobbit-extension
  extension: actions.mjs
renderer: SampleActionRenderer.js
actions:
  module: actions.mjs
  names: [retry]
