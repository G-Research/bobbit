<!doctype html>

		body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
		#app { width: 100vw; height: 100vh; }

		.overflow-y-auto { overflow-y: auto; } .overflow-x-hidden { overflow-x: hidden; } .overflow-hidden { overflow: hidden; }
		.max-w-5xl { max-width: 64rem; } .mx-auto { margin-left: auto; margin-right: auto; }
		.p-2 { padding: 8px; } .p-2\.5 { padding: 10px; } .p-3 { padding: 12px; } .p-4, .sm\:p-4 { padding: 16px; } .pb-0 { padding-bottom: 0; }
		.px-1 { padding-left: 4px; padding-right: 4px; } .px-2 { padding-left: 8px; padding-right: 8px; } .px-3 { padding-left: 12px; padding-right: 12px; } .px-4 { padding-left: 16px; padding-right: 16px; }
		.py-0\.5 { padding-top: 2px; padding-bottom: 2px; } .py-1\.5 { padding-top: 6px; padding-bottom: 6px; } .py-2 { padding-top: 8px; padding-bottom: 8px; } .py-2\.5 { padding-top: 10px; padding-bottom: 10px; }
		.pt-0 { padding-top: 0; } .pb-1 { padding-bottom: 4px; } .mt-3 { margin-top: 12px; } .mb-1 { margin-bottom: 4px; } .mb-3 { margin-bottom: 12px; }

		.items-center { align-items: center; } .items-start { align-items: flex-start; } .justify-center { justify-content: center; } .justify-end { justify-content: flex-end; }
		.flex-wrap { flex-wrap: wrap; } .flex-nowrap { flex-wrap: nowrap; }

		.border { border: 1px solid var(--border); } .border-border, .border-input { border-color: var(--border); }
