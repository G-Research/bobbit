<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Story Review</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #1a2744;
    --border: #2a3a5c;
    --text: #e0e0e0;
    --text-dim: #8899aa;
    --accent: #4fc3f7;
    --green: #66bb6a;
    --orange: #ffa726;
    --red: #ef5350;
    --purple: #b388ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; }
  .topbar .stats { margin-left: auto; font-size: 13px; color: var(--text-dim); display: flex; gap: 14px; }

  .layout { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    padding: 14px 16px 4px;
  }
  .sidebar-item {
    padding: 6px 16px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s;
  }
  .sidebar-item:hover { background: var(--surface2); }
  .sidebar-item.active { background: var(--surface2); color: var(--accent); }
  .sidebar-item .id { color: var(--text-dim); font-size: 11px; font-family: monospace; min-width: 40px; }
  .sidebar-item .title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-item .badge {
    font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600; flex-shrink: 0;
  }
  .badge-covered { background: #1b5e20; color: var(--green); }
  .badge-partial { background: #4e342e; color: var(--orange); }
  .badge-none { background: #4a1c1c; color: var(--red); }
  .badge-manual { background: #311b60; color: var(--purple); }

  .main { flex: 1; overflow-y: auto; padding: 28px 36px; }

  .story-card { display: none; }
  .story-card.visible { display: block; }

  .story-header {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .story-id {
    font-family: monospace; font-size: 14px; color: var(--accent);
    background: rgba(79,195,247,0.1); padding: 2px 10px; border-radius: 4px;
  }
  .story-title { font-size: 20px; font-weight: 600; }
  .area-tag {
    font-size: 11px; color: var(--text-dim); background: var(--surface2);
    padding: 2px 8px; border-radius: 4px; margin-left: auto;
  }

  .section { margin-bottom: 20px; }
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 8px;
  }
  .preconditions {
    background: rgba(79,195,247,0.06); border-left: 3px solid var(--accent);
    padding: 10px 14px; font-size: 14px; border-radius: 0 6px 6px 0;
  }

  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li {
    counter-increment: steps; padding: 8px 0 8px 40px; position: relative;
    font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .steps-list li:last-child { border-bottom: none; }
  .steps-list li::before {
    content: counter(steps); position: absolute; left: 0;
    width: 26px; height: 26px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 50%; text-align: center; line-height: 24px;
    font-size: 12px; font-weight: 600; color: var(--accent);
  }

  .expected-list { list-style: none; }
  .expected-list li { padding: 5px 0 5px 26px; position: relative; font-size: 14px; }
  .expected-list li::before { content: "✓"; position: absolute; left: 0; color: var(--green); font-weight: bold; }

  .coverage-box { padding: 12px 16px; border-radius: 6px; font-size: 13px; }
  .coverage-covered { background: rgba(102,187,106,0.1); border: 1px solid rgba(102,187,106,0.25); color: var(--green); }
  .coverage-partial { background: rgba(255,167,38,0.1); border: 1px solid rgba(255,167,38,0.25); color: var(--orange); }
  .coverage-none { background: rgba(239,83,80,0.1); border: 1px solid rgba(239,83,80,0.25); color: var(--red); }
  .coverage-manual { background: rgba(179,136,255,0.1); border: 1px solid rgba(179,136,255,0.25); color: var(--purple); }

  .review-bar {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .review-bar button {
    padding: 6px 18px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer;
    font-size: 13px; transition: all 0.15s;
  }
  .review-bar button:hover { border-color: var(--accent); color: var(--accent); }
  .review-bar button:disabled { opacity: 0.3; cursor: default; }
  .review-bar .spacer { flex: 1; }
  .review-bar .progress { font-size: 13px; color: var(--text-dim); }

  .filter-row { display: flex; gap: 6px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .filter-btn {
    font-size: 11px; padding: 3px 10px; border-radius: 4px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: all 0.1s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent); color: var(--accent); background: rgba(79,195,247,0.08);
  }

  kbd {
    font-size: 11px; background: var(--surface2); border: 1px solid var(--border);
    padding: 1px 5px; border-radius: 3px; font-family: monospace; color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>User Story Review</h1>
  <div class="stats">
    <span id="stat-total"></span>
    <span id="stat-covered" style="color:var(--green)"></span>
    <span id="stat-partial" style="color:var(--orange)"></span>
    <span id="stat-none" style="color:var(--red)"></span>
    <span id="stat-manual" style="color:var(--purple)"></span>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="none">Gaps</button>
      <button class="filter-btn" data-filter="manual">Manual</button>
      <button class="filter-btn" data-filter="partial">Partial</button>
    </div>
    <div id="sidebar-content"></div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<div class="review-bar">
  <button id="btn-prev">← Prev</button>
  <button id="btn-next">Next →</button>
  <span style="font-size:12px; color:var(--text-dim); margin-left:8px">
    <kbd>↑</kbd><kbd>↓</kbd> or <kbd>←</kbd><kbd>→</kbd> to navigate
  </span>
  <div class="spacer"></div>
  <div class="progress" id="progress-text"></div>
</div>

<script>
const STORIES = [
  // ── Sessions ──────────────────────────────────────────────────
  { id:"S-01", area:"Sessions", title:"Create a new session", pre:"App loaded, at least one project registered.", steps:["Click the \"+\" (New Session) button in the sidebar","Wait for session to appear in sidebar and textarea to be visible"], expected:["New session appears in sidebar with a default title","Session is selected (highlighted) in sidebar","Main panel shows empty chat with textarea focused","Context bar shows model name and provider","Session status is idle via API"], coverage:"tests/e2e/ui/session-interactions.spec.ts — \"create and send message\"", coverageLevel:"covered" },
  { id:"S-02", area:"Sessions", title:"Send a message and receive a response", pre:"Active session connected.", steps:["Type a message in the textarea","Press Enter (or click Send)","Wait for response"], expected:["User message appears in chat","Agent response appears below user message","Session status transitions: idle → streaming → idle","Textarea is re-enabled after response","Session title auto-updates if this is the first message"], coverage:"tests/e2e/ui/session-interactions.spec.ts — \"create and send message\"", coverageLevel:"covered" },
  { id:"S-03", area:"Sessions", title:"Draft isolation across sessions", pre:"Two active sessions exist.", steps:["Navigate to session A","Type \"draft for A\" in textarea (don't send)","Navigate to session B","Type \"draft for B\" in textarea (don't send)","Navigate back to session A","Navigate back to session B"], expected:["Session A textarea shows \"draft for A\" on return","Session B textarea shows \"draft for B\" on return","Drafts never leak between sessions","Drafts survive page reload (persisted to sessionStorage)"], coverage:"None — draft isolation is untested.", coverageLevel:"none" },
  { id:"S-04", area:"Sessions", title:"Terminate a session", pre:"Active session exists.", steps:["Hover over session in sidebar","Click the X (terminate) button","Confirm if prompted"], expected:["Session disappears from sidebar","If session was selected, main panel shows landing or next session","API confirms session is terminated/archived","Worktree is cleaned up (if session had one)"], coverage:"tests/e2e/ui/session-interactions.spec.ts — \"terminate session\"", coverageLevel:"covered" },
  { id:"S-05", area:"Sessions", title:"Switch between sessions", pre:"Multiple sessions exist with messages.", steps:["Click session A in sidebar","Verify messages load","Click session B in sidebar","Verify messages load","Click back to session A"], expected:["Each session shows its own messages (never mixed)","Sidebar highlights the active session","Context bar updates to show correct model/provider","Previous session's WebSocket is disconnected (or cached)","No console errors during switching"], coverage:"tests/e2e/ui/session-interactions.spec.ts — partial; rapid switching untested", coverageLevel:"partial" },
  { id:"S-06", area:"Sessions", title:"Rapid session switching (stress)", pre:"4+ sessions with messages exist.", steps:["Click session A","Immediately click session B (don't wait for A to load)","Immediately click session C","Wait for C to fully load"], expected:["Final session (C) loads correctly with its messages","No stale messages from A or B visible","No console errors","Sidebar shows C as active","Loading indicator shows during transition, clears when connected"], coverage:"None — rapid switching is untested.", coverageLevel:"none" },
  { id:"S-07", area:"Sessions", title:"Session survives page reload", pre:"Active session with messages.", steps:["Send a message, wait for response","Reload the page (F5)","Wait for app to reconnect"], expected:["Session appears in sidebar","Clicking it shows previous messages","Can send new messages","Context bar shows correct model info"], coverage:"tests/e2e/ui/session-interactions.spec.ts — \"reload preserves session\"", coverageLevel:"covered" },
  { id:"S-08", area:"Sessions", title:"Session with worktree", pre:"Project is a git repo.", steps:["Create a new session","Check session info via API"], expected:["Session CWD is in a worktree directory (not project root)","Session has its own git branch (not master)","Git status widget renders in the UI"], coverage:"tests/e2e/ui/session-worktree.spec.ts", coverageLevel:"covered" },
  { id:"S-09", area:"Sessions", title:"Rename a session", pre:"Active session exists.", steps:["Right-click (or long-press) session in sidebar","Select \"Rename\"","Type new title","Confirm"], expected:["Session title updates in sidebar immediately","Title persists across page reload","Title visible in session header"], coverage:"None — rename UI flow is untested.", coverageLevel:"none" },
  { id:"S-10", area:"Sessions", title:"Change model mid-session", pre:"Active session connected.", steps:["Click model selector in context bar","Select a different model","Send a message"], expected:["Context bar updates to show new model","Agent uses new model for next response","Model choice persists across reconnect"], coverage:"tests/e2e/context-bar-reconnect.spec.ts (API-level), no UI E2E", coverageLevel:"partial" },
  { id:"S-11", area:"Sessions", title:"Abort a running agent", pre:"Agent is streaming a response.", steps:["Send a message that triggers a long response","Click the Stop button while agent is streaming"], expected:["Agent stops generating","Partial response is visible","Textarea re-enables","Session returns to idle","Can send new messages after abort"], coverage:"tests/e2e/steer-midturn.spec.ts (API-level abort), no UI click test", coverageLevel:"partial" },
  { id:"S-12", area:"Sessions", title:"Queue management", pre:"Agent is busy (streaming).", steps:["Send a message while agent is busy","Verify it appears in the queue","Send another message","Reorder the queue","Remove one queued message"], expected:["Queued messages appear in queue UI","Reordering changes execution order","Removed message does not execute","When agent finishes, next queued message is sent automatically"], coverage:"tests/e2e/ui/queue-ui.spec.ts — 5 tests", coverageLevel:"covered" },
  { id:"S-13", area:"Sessions", title:"Tool permission grant/deny", pre:"Session active, tool policy set to \"ask\".", steps:["Send a message that triggers a guarded tool","Tool permission dialog appears","Click \"Allow\" (or \"Deny\")"], expected:["Allow: tool executes, response includes tool output","Deny: agent receives denial, responds accordingly","Dialog disappears after action","If \"Allow always\", subsequent uses don't prompt"], coverage:"tests/e2e/ui/tool-ask-policy.spec.ts — 3 tests", coverageLevel:"covered" },
  { id:"S-14", area:"Sessions", title:"Session survives gateway crash", pre:"Active session with messages, gateway running.", steps:["Send a message, wait for response","Gateway process is killed (hard crash)","Gateway restarts on new port","Navigate to the session"], expected:["Session appears in sidebar (not archived)","Previous messages are visible","Can send new messages","CWD is preserved","Git status widget renders (if worktree session)"], coverage:"Manual integration tests only — session-resilience.spec.ts", coverageLevel:"manual" },

  // ── Goals ─────────────────────────────────────────────────────
  { id:"G-01", area:"Goals", title:"Create a goal via assistant", pre:"App loaded, project registered.", steps:["Click \"New Goal\" in sidebar","Assistant session opens with auto-prompt","Type goal description (or GOAL_PROPOSAL keyword)","Agent calls propose_goal tool","Goal preview form appears in right panel","Review/edit title, spec, workflow selection","Toggle optional steps (e.g. QA testing)","Click \"Create Goal\""], expected:["Goal appears in sidebar under project","Navigates to goal dashboard","Assistant session is terminated","Workflow gates created per selected workflow","Optional steps reflect toggles"], coverage:"tests/e2e/ui/goal-creation.spec.ts — \"goal creation via assistant flow\"", coverageLevel:"covered" },
  { id:"G-05", area:"Goals", title:"Goal dashboard — overview", pre:"Goal exists with team started.", steps:["Click goal in sidebar","Dashboard loads"], expected:["Title and spec visible","Setup status shown (ready/pending)","Team section shows agents with status","Gates/workflow tab accessible","PR status shown if branch pushed"], coverage:"Minimal — team-lifecycle-ui checks load but doesn't assert content deeply", coverageLevel:"partial" },
  { id:"G-06", area:"Goals", title:"Goal dashboard — gates tab", pre:"Goal with workflow gates.", steps:["Navigate to goal dashboard","Click Gates/Workflow tab"], expected:["All gates listed with status (pending/passed/failed)","Dependencies shown","Signal button for eligible gates","Passed gates: green checkmark","Failed gates: red X with verification output"], coverage:"gate-verification-ux.spec.ts — partial. Gate display untested.", coverageLevel:"partial" },
  { id:"G-07", area:"Goals", title:"Signal a gate", pre:"Gate is eligible (dependencies met).", steps:["Navigate to gates tab","Enter gate content (markdown)","Click Signal","Verification runs asynchronously"], expected:["Gate status transitions to verifying","Verification output streams in modal","On pass: gate shows passed status","On fail: gate shows failed with output","Downstream gates become eligible"], coverage:"gates-api.spec.ts (API thorough). UI signal flow untested.", coverageLevel:"partial" },
  { id:"G-09", area:"Goals", title:"Goal with sandbox", pre:"Docker available, sandbox configured.", steps:["Create goal with sandbox toggle enabled","Wait for setup"], expected:["Container created/reused for project","Worktree created inside container","Team agents run inside container","Git status works through container exec"], coverage:"Manual integration test only. Automated tests skipped.", coverageLevel:"manual" },
  { id:"G-10", area:"Goals", title:"Re-attempt a failed goal", pre:"Goal previously failed or abandoned.", steps:["Start new goal assistant session","System detects previous attempt","Re-attempt context injected"], expected:["Assistant acknowledges previous attempt","Can reuse or modify previous spec","New goal created with fresh gates"], coverage:"None — re-attempt flow is untested.", coverageLevel:"none" },
  { id:"G-12", area:"Goals", title:"Goal survives gateway crash", pre:"Goal with team running.", steps:["Gateway crashes","Gateway restarts"], expected:["Goal appears in sidebar","Dashboard loads with correct status","Team sessions restored","Gates preserve their status","Can continue working on the goal"], coverage:"Manual integration test only.", coverageLevel:"manual" },

  // ── Roles ─────────────────────────────────────────────────────
  { id:"R-01", area:"Roles", title:"View roles list", pre:"App loaded.", steps:["Navigate to #/roles"], expected:["All roles listed (builtin + server + project overrides)","Each role shows origin badge (grey/blue/green)","Inherited roles at 70% opacity","Project scope row visible if multiple projects"], coverage:"tests/e2e/ui/config-scope.spec.ts — partial (scope row, badges)", coverageLevel:"partial" },
  { id:"R-02", area:"Roles", title:"Create a custom role", pre:"On roles page.", steps:["Click \"New Role\" button","Fill in name, label, prompt","Configure tool policies (optional)","Save"], expected:["Role appears in list with correct origin badge","Role available in session role picker","Role YAML written to config directory"], coverage:"roles-api.spec.ts (API CRUD). No UI create test.", coverageLevel:"partial" },
  { id:"R-03", area:"Roles", title:"Edit an existing role", pre:"Custom role exists.", steps:["Click role in list","Edit page loads with current values","Modify prompt or policies","Save"], expected:["Changes persisted to YAML","Existing sessions using this role unaffected","New sessions pick up changes"], coverage:"roles-api.spec.ts (API PUT). No UI edit test.", coverageLevel:"partial" },
  { id:"R-04", area:"Roles", title:"Delete a custom role", pre:"Custom role exists (not builtin).", steps:["Click role in list","Click Delete button","Confirm"], expected:["Role removed from list","YAML file deleted","Cannot select deleted role for new sessions"], coverage:"roles-api.spec.ts (API DELETE). No UI delete test.", coverageLevel:"partial" },
  { id:"R-05", area:"Roles", title:"Customize a builtin role (override)", pre:"Builtin role exists, multiple projects registered.", steps:["Navigate to roles page with project scope","Click \"Customize\" on builtin role","Modify the prompt","Save"], expected:["Override created at project level","Role shows green origin badge","Project sessions use override","Other projects still see builtin"], coverage:"config-cascade-api.spec.ts (API). config-scope.spec.ts (partial UI).", coverageLevel:"partial" },
  { id:"R-07", area:"Roles", title:"Role used in session creation", pre:"Custom role exists.", steps:["Click role picker dropdown on New Session button","Select custom role","Create session"], expected:["Session created with custom role's prompt","Tool policies from role applied","Context bar may show role indicator"], coverage:"None — role picker flow untested.", coverageLevel:"none" },
  { id:"R-08", area:"Roles", title:"Config cascade affects goal team", pre:"Goal with team, role customized at project level.", steps:["Team spawns agent with a role","Role resolves through cascade (project > server > builtin)"], expected:["Agent gets project-level role override","Role prompt includes project customizations","This is the bug path where cascade broke goal creation"], coverage:"None — cascade effect on team roles untested.", coverageLevel:"none" },

  // ── Config Cascade ────────────────────────────────────────────
  { id:"CC-01", area:"Config Cascade", title:"Three-layer resolution", pre:"Builtin, server override, and project override exist.", steps:["Query resolved roles for project"], expected:["Project override wins over server","Server override wins over builtin","Each item tagged with correct origin","Items without overrides show builtin origin"], coverage:"config-cascade-api.spec.ts — thorough API tests", coverageLevel:"covered" },
  { id:"CC-03", area:"Config Cascade", title:"Customize action (UI)", pre:"Inherited item, project scope selected.", steps:["Click \"Customize\" on inherited item","Edit form pre-populated with inherited values","Modify and save"], expected:["Override created at selected scope","Origin badge changes","Opacity becomes 100%","Revert button appears"], coverage:"API-level only (config-cascade-api.spec.ts). No UI test.", coverageLevel:"partial" },
  { id:"CC-05", area:"Config Cascade", title:"Cascade affects session creation", pre:"Role customized at project level.", steps:["Create a session in that project","Check which role prompt is used"], expected:["Session gets project-level role override","Not the builtin or server version"], coverage:"None — cascade effect on sessions untested.", coverageLevel:"none" },
  { id:"CC-06", area:"Config Cascade", title:"Cascade affects goal creation", pre:"Workflow customized at project level.", steps:["Create a goal in that project","Check which workflow gates are created"], expected:["Goal uses project-level workflow override","Gates match customized workflow","Known bug path: builtin resolution broke goal creation"], coverage:"None — known bug path with no automated test.", coverageLevel:"none" },

  // ── Resilience ────────────────────────────────────────────────
  { id:"RE-01", area:"Resilience", title:"Session survives gateway crash", pre:"Active session with messages.", steps:["Send message, receive response","Kill gateway process","Restart gateway (new port, same data dir)","Connect to app","Navigate to session"], expected:["Session in sidebar, not archived","Messages preserved","CWD preserved","Can send follow-up messages","Git status widget renders (if worktree)"], coverage:"Manual integration test only.", coverageLevel:"manual" },
  { id:"RE-03", area:"Resilience", title:"Persistence files on crash", pre:"Sessions and goals exist.", steps:["Kill gateway (hard crash)","Check data directory"], expected:["sessions.json exists and is valid JSON","goals.json exists and is valid JSON","gates.json exists","team-state.json exists","Session .jsonl files exist"], coverage:"Manual integration test only.", coverageLevel:"manual" },
  { id:"RE-04", area:"Resilience", title:"Worktree preserved across restart", pre:"Session with worktree.", steps:["Create session (gets worktree)","Verify worktree directory exists","Kill and restart gateway","Check session CWD"], expected:["Worktree directory still exists","CWD points to same worktree","Git branch unchanged","Can continue working in worktree"], coverage:"Manual integration test only.", coverageLevel:"manual" },
  { id:"RE-06", area:"Resilience", title:"Multiple sessions survive crash", pre:"5+ sessions of mixed types.", steps:["Create sessions of each type","Send messages to each","Kill gateway","Restart","Verify each session individually"], expected:["All sessions present (none archived)","Each has correct CWD, branch, messages","Can interact with each after restart"], coverage:"Manual integration test — 6 variations.", coverageLevel:"manual" },
];

let currentIndex = 0;
let filteredStories = [...STORIES];

function badgeClass(l) { return ({covered:'badge-covered',partial:'badge-partial',none:'badge-none',manual:'badge-manual'})[l]; }
function badgeLabel(l) { return ({covered:'Covered',partial:'Partial',none:'Gap',manual:'Manual'})[l]; }
function covClass(l) { return ({covered:'coverage-covered',partial:'coverage-partial',none:'coverage-none',manual:'coverage-manual'})[l]; }

function buildSidebar() {
  const el = document.getElementById('sidebar-content');
  let html = '', lastArea = '';
  filteredStories.forEach((s, i) => {
    if (s.area !== lastArea) { lastArea = s.area; html += `<div class="sidebar-label">${s.area}</div>`; }
    html += `<div class="sidebar-item${i===currentIndex?' active':''}" data-i="${i}">
      <span class="id">${s.id}</span><span class="title">${s.title}</span>
      <span class="badge ${badgeClass(s.coverageLevel)}">${badgeLabel(s.coverageLevel)}</span></div>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('.sidebar-item').forEach(e =>
    e.addEventListener('click', () => { currentIndex = +e.dataset.i; render(); }));
}

function buildCards() {
  const el = document.getElementById('main-content');
  el.innerHTML = filteredStories.map((s, i) => `
    <div class="story-card${i===currentIndex?' visible':''}" data-i="${i}">
      <div class="story-header">
        <span class="story-id">${s.id}</span>
        <span class="story-title">${s.title}</span>
        <span class="area-tag">${s.area}</span>
      </div>
      <div class="section">
        <div class="section-label">Preconditions</div>
        <div class="preconditions">${s.pre}</div>
      </div>
      <div class="section">
        <div class="section-label">Steps</div>
        <ol class="steps-list">${s.steps.map(t=>`<li>${t}</li>`).join('')}</ol>
      </div>
      <div class="section">
        <div class="section-label">Expected Outcomes</div>
        <ul class="expected-list">${s.expected.map(t=>`<li>${t}</li>`).join('')}</ul>
      </div>
      <div class="section">
        <div class="section-label">Test Coverage</div>
        <div class="coverage-box ${covClass(s.coverageLevel)}">${s.coverage}</div>
      </div>
    </div>`).join('');
}

function render() {
  buildSidebar();
  document.querySelectorAll('.story-card').forEach((e,i) => e.classList.toggle('visible', i===currentIndex));
  document.querySelectorAll('.sidebar-item').forEach((e,i) => {
    e.classList.toggle('active', i===currentIndex);
    if (i===currentIndex) e.scrollIntoView({block:'nearest'});
  });
  const p = document.getElementById('progress-text');
  p.textContent = `${currentIndex+1} / ${filteredStories.length}`;
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === filteredStories.length - 1;

  const c = (l) => filteredStories.filter(s=>s.coverageLevel===l).length;
  document.getElementById('stat-total').textContent = `${filteredStories.length} stories`;
  document.getElementById('stat-covered').textContent = `${c('covered')} covered`;
  document.getElementById('stat-partial').textContent = `${c('partial')} partial`;
  document.getElementById('stat-none').textContent = `${c('none')} gaps`;
  document.getElementById('stat-manual').textContent = `${c('manual')} manual-only`;
}

function applyFilter(f) {
  filteredStories = f==='all' ? [...STORIES] : STORIES.filter(s=>s.coverageLevel===f);
  currentIndex = 0;
  buildCards(); render();
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));
}

document.getElementById('btn-prev').addEventListener('click',()=>{ if(currentIndex>0){currentIndex--;render();} });
document.getElementById('btn-next').addEventListener('click',()=>{ if(currentIndex<filteredStories.length-1){currentIndex++;render();} });
document.addEventListener('keydown', e => {
  if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();if(currentIndex>0){currentIndex--;render();}}
  if(e.key==='ArrowDown'||e.key==='ArrowRight'){e.preventDefault();if(currentIndex<filteredStories.length-1){currentIndex++;render();}}
});
document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>applyFilter(b.dataset.filter)));

buildCards(); render();
</script>
</body>
</html>
