# Hindsight runtime manifest (P1 — pure descriptor, no Docker execution).
#
# Consumed by the runtime manifest parser/validator (src/server/runtime/manifest.ts)
# and the pure helper utilities (src/server/runtime/helpers.ts). This file only
# DECLARES the runtime; it never runs anything.
id: hindsight
title: Hindsight
description: >-
  Managed Hindsight stack — API + web UI backed by Postgres. Supports a fully
  managed Postgres (bind-mounted data dir) or an external/operator-supplied
  Postgres via a connection URL.

# Compose template lives one directory up, inside the same pack root. The parser
# resolves this relative to THIS manifest file and rejects any path that escapes
# the pack root.
composeFile: ../runtime/compose.yaml

# Default managed data directory for the bind-mounted Postgres volume. The
# `${dataDir:-~/.hindsight}` form is a declarative default: callers may override
# `dataDir`, otherwise it falls back to `~/.hindsight`.
dataDir: ${dataDir:-~/.hindsight}

# Secrets are generated-and-persisted by the runtime helpers (idempotent), EXCEPT
# where `fromUserSecret` is set — those are wired from a configured user secret
# and never generated.
secrets:
  # Managed Postgres password — generated once and persisted via SecretsStore.
  - key: HINDSIGHT_DB_PASSWORD
    generate: true
  # Hindsight API session/encryption secret — generated once and persisted.
  - key: HINDSIGHT_API_SECRET
    generate: true

# Host ports allocated via bind :0, persisted, and re-validated on boot by the
# runtime helpers.
ports:
  - key: HINDSIGHT_WEB_PORT
    target: 3000
  - key: HINDSIGHT_API_PORT
    target: 8080

# Base environment shared by all modes. `secret` refs resolve to persisted/
# generated secret values; `userSecret` refs resolve from a configured user
# secret and are required (never generated).
env:
  # LLM API key MUST come from a configured user secret — not generated.
  HINDSIGHT_API_LLM_API_KEY:
    userSecret: HINDSIGHT_API_LLM_API_KEY
    required: true
  HINDSIGHT_API_SECRET:
    secret: HINDSIGHT_API_SECRET
  HINDSIGHT_WEB_PORT:
    port: HINDSIGHT_WEB_PORT
  HINDSIGHT_API_PORT:
    port: HINDSIGHT_API_PORT

# Mode-specific argument construction. `managed-postgres` is the default and
# includes the `db` service. `external-postgres` omits `db` and injects a
# caller-supplied connection URL.
modes:
  managed-postgres:
    default: true
    description: >-
      Fully managed Postgres. Includes the `db` service with a bind-mounted data
      directory; the API connects to it over the compose network.
    services:
      - api
      - web
      - db
    env:
      HINDSIGHT_DB_PASSWORD:
        secret: HINDSIGHT_DB_PASSWORD
      HINDSIGHT_DATA_DIR:
        value: ${dataDir:-~/.hindsight}
      # Managed DB connection string assembled from the generated password and
      # the in-compose `db` service hostname.
      HINDSIGHT_API_DATABASE_URL:
        value: postgres://hindsight:${HINDSIGHT_DB_PASSWORD}@db:5432/hindsight

  external-postgres:
    description: >-
      Operator-supplied Postgres. Omits the managed `db` service; the API uses
      the externally provided HINDSIGHT_API_DATABASE_URL.
    services:
      - api
      - web
    env:
      # Required external connection URL. Injected into the API service; no `db`
      # service is started in this mode.
      HINDSIGHT_API_DATABASE_URL:
        userSecret: HINDSIGHT_API_DATABASE_URL
        required: true
