name: hindsight_recall
description: "Recall relevant memories from the Hindsight bank for a query."
summary: "Recall long-term memories for a query"
params: [query, scope?, tags?]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Hindsight
docs: |-
  Required: `query`. Optional: `scope` (`project` | `all`), `tags` (simple
  key→value map).

  Fetches durable memories from the shared Hindsight bank. Omit `scope` for the
  configured default (`project` = this project + shared/global memories);
  `scope: all` searches every project in the bank. `scope: project` restricts to
  this project (route adds a `project:<id>` tag when a real project id is present)
  while still surfacing untagged/global memories. Use `tags` only for a simple
  targeted filter (e.g. `{ goal: "..." }` or `{ project: "..." }`) — compound
  boolean `tag_groups` queries are a direct Hindsight API escape hatch documented
  in docs/hindsight-memory.md. Returns a concise list plus the structured route
  result under `details`. Dormant (unconfigured) Hindsight returns an empty
  result, not an error.
detail_docs: >-
  ## Purpose


  `hindsight_recall` retrieves durable, long-term memories (past decisions,
  preferences, project facts) from the single shared Hindsight bank so the agent
  can ground its work in accumulated context.


  The tool NEVER talks to Hindsight directly. It mints a tool-bound surface
  token and dispatches the pack's `recall` route, which owns bank resolution
  (default `bobbit`), external/managed-mode handling, dormancy, and the
  scope→tag mapping.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `query` | string | **Yes** | What to recall. |

  | `scope` | `project` \| `all` | No | `project` scopes to this project (plus
  shared/global) via a project tag; `all` searches the whole bank. Defaults to the
  pack's configured `recallScope` (`project`). |

  | `tags` | map | No | Simple key→value filter for a targeted query (e.g. `{ goal:
  "..." }`). Merged additively with the scope filter. |


  ## Notes


  - Scope maps to tag filters on the SAME shared bank — never a different bank.

  - `project` scope returns this project's memories AND untagged/global ones
  (`tags_match: any`), excluding only other projects; it adds a `project:<id>`
  filter only when the session has a real project id.

  - `tags` is intentionally a flat map. Compound boolean `tag_groups` queries are a
  direct Hindsight data-plane API escape hatch (see docs/hindsight-memory.md), not
  exposed to the agent.

  - Unconfigured Hindsight returns an empty list (dormant), not an error.
