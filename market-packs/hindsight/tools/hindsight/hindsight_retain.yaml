name: hindsight_retain
description: "Persist a memory to the Hindsight bank for future recall."
summary: "Save a durable memory for future recall"
params: [content, scope?, tags?, sync?]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Hindsight
docs: |-
  Required: `content`. Optional: `scope` (`project` | `all`), `tags`
  (key/value, additive), `sync` (wait for durability).

  Stores a durable memory on the shared Hindsight bank with automatic trusted
  context tags: `kind:manual`, plus project/goal/session/agent when available.
  `scope: all` adds no project tag. User `tags` are additive and never change
  the bank or override automatic tags. Returns success/error from the route.
detail_docs: >-
  ## Purpose


  `hindsight_retain` durably records a memory (a decision, preference, or fact
  worth remembering) on the single shared Hindsight bank for later recall.


  The tool NEVER talks to Hindsight directly. It mints a tool-bound surface
  token and dispatches the pack's `retain` route, which owns bank resolution
  (default `bobbit`), trusted auto-tagging (`kind:manual` plus available
  project/goal/session/agent context), and the scope→tag mapping.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `content` | string | **Yes** | The memory text to store. |

  | `scope` | `project` \| `all` | No | `project` tags the memory to this
  project; `all` leaves it unscoped on the shared bank. Defaults to the pack's
  configured `recallScope`. |

  | `tags` | object | No | Extra key/value tags, merged additively. Automatic context tags win on conflict. |

  | `sync` | boolean | No | Wait for the write to be durable. Default `false`. |


  ## Notes


  - Scope maps to a project TAG on the SAME shared bank — never a different
  bank.

  - The project tag is only added for `scope: project` when the session has a real project id.

  - Goal, session, and agent tags are added from trusted server context when available.

  - User `tags` are additive and must not change the bank or override automatic context tags.

  - Unconfigured Hindsight returns a not-configured error (dormant).
