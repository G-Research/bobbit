name: hindsight_reflect
description: "Reflect over the Hindsight bank to synthesize an answer to a prompt."
summary: "Synthesize an answer from long-term memory"
params: [prompt, scope?]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Hindsight
docs: |-
  Required: `prompt`. Optional: `scope` (`project` | `all`).

  Asks Hindsight to synthesize an answer over the shared bank rather than
  returning a raw recall list. `scope: project` restricts reflection to this
  project's memories (the route adds a `project:<id>` tag filter when a real
  project id is present); `scope: all` reflects over the whole bank. When `scope`
  is omitted the pack's configured `recallScope` applies. Scope maps to a tag
  filter on the SAME shared bank — never a different bank. Returns the synthesized
  text. Dormant (unconfigured) Hindsight returns empty text, not an error.
detail_docs: >-
  ## Purpose


  `hindsight_reflect` produces a synthesized answer drawing on accumulated
  long-term memory, as opposed to `hindsight_recall` which returns matching
  memory records.


  The tool NEVER talks to Hindsight directly. It mints a tool-bound surface
  token and dispatches the pack's `reflect` route, which runs over the resolved
  shared bank (default `bobbit`).


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `prompt` | string | **Yes** | The question to reflect on. |

  | `scope` | `project` \| `all` | No | `project` filters reflection to this
  project's memories via a `project:<id>` tag; `all` reflects over the whole
  bank. Defaults to the pack's configured `recallScope`. Maps to a tag filter on
  the SAME shared bank — never a different bank. |


  ## Notes


  - Scope maps to a tag filter on the single resolved bank — no extra banks, no
  direct Hindsight calls.

  - A `project` reflect only adds a `project:<id>` filter when the session has a
  real project id; otherwise no project tag is fabricated.

  - Unconfigured Hindsight returns empty text (dormant), not an error.
