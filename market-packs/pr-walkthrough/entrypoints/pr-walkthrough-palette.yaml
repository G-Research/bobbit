id: pr-walkthrough.palette
kind: command-palette
label: Open PR Walkthrough
# A command-palette LAUNCHER (the command palette). Its selection IS the user
# gesture. SPAWN-ON-CLICK model (launch UX correction): like every launch surface,
# it calls the pack `run` route to mint a fresh read-only reviewer sub-agent, then
# opens the panel in the returned child session and auto-switches to it. No
# owner-session panel is ever mounted; a NO_PR / spawn failure spawns nothing.
target:
  action: spawn
  route: run
  panelId: pr-walkthrough.panel
