id: pr-walkthrough.git-widget
kind: git-widget-button
label: PR Walkthrough
# A git-widget-button LAUNCHER (the git status widget dropdown). Its selection IS
# the user gesture. SPAWN-ON-CLICK model (launch UX correction): the click does NOT
# open a panel in the current (owner) session. Instead the platform launcher calls
# the pack `run` route (POST, empty body) which mints a fresh read-only reviewer
# sub-agent, then opens `panelId` in the returned child session and auto-switches the
# view to it. A NO_PR / spawn failure surfaces as an inline error in the git-widget
# dropdown and spawns nothing. Always-fresh: every click is a NEW reviewer (the old
# server-side reviewerKey dedup is gone; a within-gesture guard blocks double-spawn).
target:
  action: spawn
  route: run
  panelId: pr-walkthrough.panel
