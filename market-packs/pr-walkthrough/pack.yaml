name: pr-walkthrough
description: >-
  Reviews pull requests in a dedicated walkthrough panel with a pack-scoped
  reviewer role and PR walkthrough analysis tools.
version: 1.0.0
contents:
  # pr-reviewer: the read-only reviewer role minted by the `run` route via
  # host.agents.spawn. Its toolPolicies allow the "PR Walkthrough" group (the
  # three walkthrough tools); that group is default-deny for every other role, so
  # submit_pr_walkthrough_yaml is reachable ONLY from this role (design Decision C).
  roles: [pr-reviewer]
  tools: [pr-walkthrough]
  skills: []
  entrypoints:
    - pr-walkthrough-open
    - pr-walkthrough-git-widget
    - pr-walkthrough-palette
    - pr-walkthrough-route
# ── routes: (pack-level) — re-expresses handlePrWalkthroughApiRoute under the
#    pack's namespace. Reached via host.callRoute("bundle"|"publish"). The server
#    resolves the trusted packId from the caller's surface token and resolves the
#    route MODULE via the pack-level RouteRegistry (opener-independent).
#    `module` resolves relative to THIS pack.yaml and stays inside the pack root.
#    LIVE RECOMPUTE (design §D2.3): node:child_process + node:fs are ambient in
#    the confined worker (trusted tool/MCP tier), so `bundle` runs REAL `git diff`
#    LIVE against the SERVER-derived session worktree. `publish` persists
#    LLM-enhanced cards to the implicit pack-scoped store.
#    `run` mints the isolated read-only reviewer child via host.agents.spawn (no
#    longer host.session.postMessage); `status` polls it (host.agents.status +
#    pack-store submitted-YAML marker). `bundle`/`publish` are byte-stable.
routes:
  module: lib/routes.mjs
  names: [bundle, publish, run, status, recover]
