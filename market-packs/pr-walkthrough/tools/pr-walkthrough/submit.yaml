name: submit_pr_walkthrough_yaml
description: "Compatibility wrapper that stores a complete PR walkthrough YAML document chunk and finalizes it."
summary: "Submit full walkthrough YAML"
params: [yaml]
provider:
  type: bobbit-extension
  extension: extension.ts
group: PR Walkthrough
docs: |-
  Prefer submit_pr_walkthrough_chunk for durable incremental progress. This migration wrapper stores the full document as the document chunk, validates it, publishes the final payload, and remains available for older reviewer prompts.
