name: read_pr_walkthrough_submission_status
description: "Read saved PR walkthrough chunk ids and finalization status for this reviewer."
summary: "Read walkthrough chunk status"
params: []
provider:
  type: bobbit-extension
  extension: extension.ts
group: PR Walkthrough
docs: |-
  Call after compaction, retry, restart, or compact submit_pr_walkthrough_chunk saves to read the full saved-chunk state, missing required sections, next required work, validation issues, and finalization status. Compact chunk saves intentionally return only a small status object; this tool is the complete status read.
