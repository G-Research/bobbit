name: code_references
description: "Find all references to a TypeScript symbol at a file position"
summary: "Find all call sites of a TS symbol (TS-only)"
params: [file, line, col]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Code
docs: |-
  Finds every reference to the TypeScript symbol at `file:line:col` (1-based), via a gateway-owned tsserver instance for the session's worktree. TS-only; requires a `tsconfig.json` reachable from the file. Results are capped (~50) with a truncated/total marker. Returns `[unavailable]` with a reason (not an error) when LSP can't serve the request.
detail_docs: |-
  ## Purpose

  `code_references` wraps `textDocument/references` (`includeDeclaration:
  true`) against a gateway-owned `typescript-language-server` instance kept
  warm per worktree. It finds every call/use site of a symbol precisely,
  including across files — the case `grep` handles worst (a common short
  name reused on unrelated types).

  ## Parameters

  | Name | Type | Required | Description |
  |------|------|----------|-------------|
  | `file` | string | Yes | File path — relative to your worktree, or absolute. |
  | `line` | number | Yes | 1-based line number of the symbol. |
  | `col` | number | Yes | 1-based column number of the symbol. |

  ## Output

  ```
  12 of 12 references:
  - src/server/agent/session-manager.ts:412:2
  - src/server/routes/session-utility-routes.ts:31:18
  ...
  ```

  A hot symbol (e.g. something in `server.ts`) can have hundreds of
  references — the list is capped (order of 50); a `(truncated)` marker
  appears with the real `totalCount` when more exist. Narrow to a more
  specific symbol/file rather than assuming the capped list is exhaustive.

  `[unavailable] <reason>` (optionally `(retryable — ...)`) replaces the list
  when LSP can't serve the request (design doc §6) — treat it as "fall back
  to grep", not a broken call.

  ## When to Use

  - Checking every call site of a function/type before renaming or changing
  its signature — more reliable than a name-based `grep` across a large repo.

  ## When NOT to Use

  - **No exact position** — get a `file:line:col` first (via `grep`/`rg` or
  `code_symbols`).
  - **You need it to be exhaustive and it says `truncated`** — re-scope the
  query (e.g. per-directory `grep` as a supplement) rather than trusting the
  capped list alone.

  ## Notes / Gotchas

  - Same worktree/tsconfig/cold-start caveats as `code_definition` — see that
  tool's notes.
  - `tests/**` frequently has no covering `tsconfig.json`; references there
  won't resolve (a known, pre-existing gap).
