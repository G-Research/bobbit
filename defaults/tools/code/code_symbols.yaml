name: code_symbols
description: "List symbols in a TypeScript file, or search project-wide with query"
summary: "List or search TS symbols"
params: [file, query?]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Code
docs: |-
  Lists TypeScript symbols (classes/functions/methods/etc.) in `file`, or with `query` set runs a project-wide fuzzy symbol search anchored at `file`. Via a gateway-owned tsserver instance for the session's worktree. TS-only; requires a `tsconfig.json` reachable from `file`. Returns `[unavailable]` with a reason (not an error) when LSP can't serve the request.
detail_docs: |-
  ## Purpose

  `code_symbols` wraps `textDocument/documentSymbol` (no `query`) or
  `workspace/symbol` (`query` set) against a gateway-owned
  `typescript-language-server` instance kept warm per worktree. It gives a
  precise outline of a file, or a fuzzy project-wide symbol search, without
  reading whole files to build a mental map of what's declared where.

  ## Parameters

  | Name | Type | Required | Description |
  |------|------|----------|-------------|
  | `file` | string | Yes | File path — relative to your worktree, or absolute. Anchors project-wide search when `query` is set. |
  | `query` | string | No | Project-wide fuzzy symbol search text. Omit to list `file`'s own symbols. |

  ## Output

  File mode (`query` omitted):
  ```
  6 of 6 symbols [file]:
  - TsServerSupervisor (Class) :150
  - definition (Method) :183
  - references (Method) :200
  ...
  ```

  Workspace mode (`query` set):
  ```
  3 of 3 symbols [workspace]:
  - TsServerSupervisor (Class) src/server/lsp/supervisor.ts:150:2
  - TsServerSupervisorOptions (Interface) src/server/lsp/supervisor.ts:60:1
  ...
  ```

  Results are capped (order of 50) with a `(truncated)` marker + the real
  `totalCount` when more exist. `[unavailable] <reason>` replaces the list
  when LSP can't serve the request (design doc §6).

  ## When to Use

  - **File mode**: get a file's outline before deciding where to add/edit a
  method, instead of reading the whole file top to bottom.
  - **Workspace mode**: find a symbol by (partial) name across the project
  when you don't know which file it's in — faster and more precise than a
  text `grep` for common short names.

  ## When NOT to Use

  - **You already know the exact `file:line:col`** — use `code_definition`/
  `code_references`/`code_hover` directly instead.
  - **Searching for a text string, not a declared symbol** (e.g. a string
  literal, a comment) — use `grep`/`rg`/`search` instead.

  ## Notes / Gotchas

  - Workspace-mode search first warms `file` with `documentSymbol` before
  polling `workspace/symbol` (tsserver's project-wide nav index can lag the
  file-level index right after a cold start) — this can add a few seconds to
  the FIRST workspace-mode call per worktree.
  - Same tsconfig/cold-start caveats as `code_definition`.
