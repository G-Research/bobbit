name: code_definition
description: "Find where a TypeScript symbol at a file position is defined"
summary: "Jump to a TS symbol's definition (TS-only)"
params: [file, line, col]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Code
docs: |-
  Finds where the TypeScript symbol at `file:line:col` (1-based) is defined, via a gateway-owned tsserver instance for the session's worktree. TS-only; requires a `tsconfig.json` reachable from the file. Returns `[unavailable]` with a reason (not an error) when LSP can't serve the request — fall back to grep/rg in that case.
detail_docs: |-
  ## Purpose

  `code_definition` wraps `textDocument/definition` against a gateway-owned
  `typescript-language-server` instance kept warm per worktree
  (`TsServerSupervisor`, see `docs/design/lsp-product-tools.md`). It answers
  "where is this defined" precisely, across files, without the false
  positives a name-based `grep` can produce (shadowed locals, same-named
  members on different classes).

  ## Parameters

  | Name | Type | Required | Description |
  |------|------|----------|-------------|
  | `file` | string | Yes | File path — relative to your worktree, or absolute. |
  | `line` | number | Yes | 1-based line number of the symbol. |
  | `col` | number | Yes | 1-based column number of the symbol. |

  ## Output

  ```
  1 of 1 location:
  - src/server/agent/session-manager.ts:412:2
  ```

  Or, when LSP can't serve the request:

  ```
  [unavailable] no tsconfig.json found under /path/to/worktree
  ```

  `[unavailable]` is a normal, expected outcome (missing tsconfig, sandboxed
  session, cold-load timeout, tsserver crash) — not a tool error. A
  `(retryable — the project may still be loading)` suffix means the same
  call is worth retrying shortly; without it, retrying won't help (e.g. no
  tsconfig at all).

  ## When to Use

  - You have an exact `file:line:col` for a TS identifier (from a prior
  `code_symbols`/`code_references` call, a stack trace, or a diff) and need
  its definition site.

  ## When NOT to Use

  - **No exact position** — if you only have a symbol NAME, use `grep`/`rg`
  first to find a `file:line:col`, or use `code_symbols` with a `query`.
  - **Non-TS files** — this tool only understands TypeScript/JavaScript via
  tsserver.

  ## Notes / Gotchas

  - **TS-only, wave 1.** No diagnostics, no other languages yet — see
  `docs/design/lsp-product-tools.md` for the staged rollout.
  - **Results are capped** (order of 50) with a `truncated`/total count
  marker — never silently dropped.
  - **First call per worktree can take up to ~60s** (cold TS project load);
  subsequent calls against the same worktree are fast.
  - **`tests/**` often has no `tsconfig.json`** — project-wide resolution
  won't work there, a known, pre-existing gap (same one `scripts/lsp-cli.mjs`
  documents).
