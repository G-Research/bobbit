name: activate_skill
description: "Return resolved skill instructions; 403 if invocation disabled"
summary: "Activate a slash skill autonomously"
params: [name, args?]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Skills
docs: >-
  Parameters: name (required), args (optional). Returns the resolved skill body
  via the gateway's POST /api/sessions/:id/activate-skill endpoint. 404 if the
  skill is not found, 403 if the skill opts out of model invocation.
