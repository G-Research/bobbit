name: bash
description: "Execute shell commands"
summary: "Execute shell commands. Returns stdout/stderr, truncated to 2000 lines
  or 50KB."
provider:
  type: builtin
  tool: bash
group: Shell
renderer: src/ui/tools/renderers/BashRenderer.ts
docs: |-
  **Never start background processes** (`node server.js &`, `nohup`) — stdout/stderr pipes stay open and hang the agent session forever. Use `bash_bg` instead. Exit code reported alongside output. Use `--` before rg/grep patterns starting with `--`.
detail_docs: >-
  ## Purpose


  Execute an arbitrary bash command in the session's working directory. Returns
  the combined stdout and stderr output. This is the general-purpose tool for
  any operation that doesn't have a dedicated tool — running builds, tests, git
  commands, file searches, system commands, and more.


  The command runs synchronously and blocks until completion (or timeout).
  Output is captured and truncated to the **last 2000 lines or 50KB** (whichever
  is hit first). If truncation occurs, the full output is saved to a temp file
  whose path is reported.


  The exit code is reported alongside the output, so you can detect command
  failures.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `command` | string | **Yes** | The bash command to execute. Can be a simple
  command, a pipeline, or multiple commands joined with `&&`, `;`, or `|`. |

  | `timeout` | number | No | Maximum execution time in seconds. If the command
  exceeds this, it is killed. No default — commands run until completion. |

  | `description` | string | No | Short human-readable label (3–6 words)
  describing what the command does. Purely UI metadata — the command runs
  identically whether it's set or not. **When the command spans multiple lines
  or uses a heredoc, always pass `description`**, otherwise the UI collapses
  the call to a useless first-line fragment. Also recommended for non-obvious
  one-liners. |


  ## Usage Rule: `description` for multi-line commands


  The UI shows a collapsed header for every bash call, built from the first
  line of `command` truncated to 80 chars. Multi-line heredocs and `python -c
  "..."` blocks collapse to garbage like `> python -c "` — giving no clue
  what the command does. **Always pass `description` when the command has a
  newline or a heredoc.** It's optional for simple one-liners.


  ### Before / after


  **Before** (collapsed header renders as `> python -c "`):


  ```

  bash(command="python -c \"
  import json, sys

  data = json.load(open('session-costs.json'))

  total = sum(s['cost'] for s in data if s['agent'] == 'agent-qa')

  print(f'agent-qa total: ${total:.2f}')

  \"")

  ```


  **After** (collapsed header renders as `sum agent-qa costs from
  session-costs.json`):


  ```

  bash(
    command="python -c \"
  import json, sys

  data = json.load(open('session-costs.json'))

  total = sum(s['cost'] for s in data if s['agent'] == 'agent-qa')

  print(f'agent-qa total: ${total:.2f}')

  \"",
    description="sum agent-qa costs from session-costs.json"
  )

  ```


  ## When to Use


  - **Running builds and tests** — `npm run build`, `npm test`, `npx playwright
  test`

  - **Git operations** — `git status`, `git diff`, `git log`, `git commit`, `git
  push`

  - **Searching codebases** — `rg 'pattern' src/` (ripgrep), `grep -rn 'pattern'
  .`

  - **File system operations** — `ls`, `find`, `mkdir`, `cp`, `mv`, `rm`

  - **Checking system state** — `node --version`, `which python`, `netstat`

  - **Running scripts** — `node scripts/migrate.mjs`, `bash setup.sh`

  - **Installing packages** — `npm install`, `pip install`

  - **Piping and chaining** — complex multi-step operations that combine tools


  ## When NOT to Use


  - **Reading files to examine content** — use `read` instead. It handles
  pagination, image detection, and encoding properly.

  - **Writing or editing files** — use `write` or `edit` for reliable, trackable
  file modifications.

  - **Starting background servers or long-running processes** — the tool waits
  for all stdout/stderr pipes to close. A backgrounded process (`node server.js
  &`) that inherits these pipes causes the bash tool to **hang indefinitely**
  and can crash the agent session.

  - **Simple web requests for reading docs** — use `web_fetch` which extracts
  readable text automatically.


  ## Examples


  ```

  # Type-check the project before committing

  bash(command="npm run check")


  # Run E2E tests with filtered output

  bash(command="npm run build:server && npx playwright test --config
  playwright-e2e.config.ts --reporter=json 2>/dev/null | node
  scripts/test-filter.mjs")


  # Search for all usages of a function across the codebase

  bash(command="rg 'handleApiRoute' src/ --type ts -n")


  # Git workflow: check status, stage, and commit

  bash(command="git add -A && git status && git commit -m 'feat: add tool
  documentation endpoint'")


  # Check what's on a branch compared to master

  bash(command="git log --oneline master..HEAD")


  # Find all TypeScript files modified in the last commit

  bash(command="git diff --name-only HEAD~1 -- '*.ts'")


  # Run a specific test file with timeout

  bash(command="npx playwright test tests/e2e/tools-api.spec.ts --reporter=json
  2>/dev/null | node scripts/test-filter.mjs", timeout=120)

  ```


  ## Notes / Gotchas


  - **Output truncation** — only the last 2000 lines or 50KB are returned. For
  large outputs, redirect to a file (`cmd > output.txt`) and `read` it, or pipe
  through `tail`/`head`.

  - **No background processes** — `node server.js &`, `nohup`, or any
  backgrounded command that inherits stdout/stderr will cause the tool to hang
  forever. Use Playwright's `webServer` config for test servers.

  - **Working directory** — commands run in the session's working directory. Use
  `cd path &&` within the command if you need to run from a different directory,
  but prefer staying in the session directory.

  - **Exit code** — reported alongside output. Check it to detect failures in
  chained commands.

  - **Platform** — runs in Git Bash on Windows. Most Unix commands work, but
  some platform-specific tools may differ. `$TEMP` is available for temp files
  (not `/tmp`).

  - **Timeout** — if set, the command is killed after the specified seconds. Use
  for commands that might hang (network operations, potentially infinite loops).

  - **Pipes and redirects** — full bash syntax is supported including pipes
  (`|`), redirects (`>`, `>>`, `2>&1`), subshells, and command substitution
  (`$()`).\n- **`rg`/`grep` with dash-prefixed patterns** — when searching for
  patterns that start with `--` (e.g. `--extension`), ripgrep and grep interpret
  them as flags. Always use the `--` end-of-options separator before the
  pattern: `rg -- '--extension' src/`. Without `--`, you get `rg: unrecognized
  flag --extension`.
