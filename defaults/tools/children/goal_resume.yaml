name: goal_resume
description: "Resume the current goal (and optionally descendants)"
summary: "Set paused=false on the goal; with cascade=true, also resume all descendants."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Children
docs: |-
  Required: `cascade` (boolean — explicit, no default). Mirrors `goal_pause`. Returns 200 `{ resumed: <count> }`. Server returns 422 if `cascade` is omitted from the request body.

  Optional: `childGoalId` (string) — when set, resume this specific direct child instead of the caller's own goal. The child must be a direct child. Returns 403 with code `NOT_DIRECT_CHILD` if not.
detail_docs: >-
  ## Purpose


  Resume a previously paused goal. Pairs with `goal_pause` and follows
  the same cascade contract — `cascade` is **required**.
