name: goal_plan_propose
description: "Propose a (re-)plan for a parent-workflow goal"
summary: "Submit a plan or replan against the current goal's execution.verify[] — classified vs the frozen baseline."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Children
docs: |-
  Required: `steps` — array of subgoal-typed plan steps. Each step: `{ planId, title, spec, workflowId?, suggestedRole?, phase? }`. The classifier compares the proposed steps against the goal's frozen `execution.verify[]` and returns one of `noop`, `fix-up`, `expansion`, `restructure`, or `criteria-drop`. The decision matrix in SUBGOALS-SPEC §3.6 then applies the divergence policy: criteria-drop → 409, restructure on a non-paused goal → 409, expansion → always requires approval, fix-up under strict → requires approval, fix-up under balanced/autonomous → applied immediately, noop → applied (no-op).
detail_docs: >-
  ## Purpose


  Propose a plan or replan for the current parent-workflow goal. Before
  the `goal-plan` gate is signalled the array is empty and the first
  call seeds it. After signal the array is frozen and further calls go
  through the mutation classifier.


  ## Acceptance criteria coverage


  The classifier walks the union of `{rootSpec} ∪ {every proposed
  step's spec}` and verifies each acceptance criterion (parsed from the
  root spec's `## Acceptance criteria` section) is whitespace-normalised
  case-insensitive substring-found in that union. If any criterion is
  uncovered, the result is `criteria-drop` and the call returns 409 —
  no policy override applies. **Quote criteria verbatim** in the
  relevant subgoal's spec to ensure coverage.


  ## Returns


  - `{ kind: "noop" | "fix-up", applied: true }` — plan applied directly.

  - `{ kind: "fix-up" | "expansion" | "restructure", requestId, requiresApproval: true }`
    — request queued; user approves via `goal_decide_mutation`.

  - 409 with `{ kind: "restructure" | "criteria-drop", uncoveredCriteria? }`
    — rejected.
