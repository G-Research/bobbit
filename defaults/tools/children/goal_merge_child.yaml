name: goal_merge_child
description: "Merge a child goal's branch locally into the parent"
summary: "Local-merge a child's branch into the parent and auto-archive the child on success."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Children
docs: |-
  Required: `childGoalId`. Performs a local `git merge --no-ff` of the child's branch into the parent's branch. This operation does not publish either branch; publication must be explicitly requested through a separate operation. For multi-repo goals, matching component worktrees merge sequentially and their outcomes are returned in `repos`. If a later component conflicts, earlier successful local merges remain applied and are not destructively rolled back. The 409 response includes `{ conflict: true, output, repos? }`; the child stays live for repair and retry. On full success the child is archived and its team is torn down.
detail_docs: >-
  ## Purpose


  Manually trigger a local merge of a child goal's branch into the
  parent. Normally the verification harness's `runSubgoalStep` does this
  automatically when the child's `ready-to-merge` passes; this tool is
  the agent-facing escape hatch for the rare case where automation
  doesn't fire (workflow-less child recovery, manual force, etc.).


  ## Security


  Validates `child.parentGoalId === <current goal id>` — cross-tree
  merges are rejected with 400.


  ## Returns


  - `{ merged: true, alreadyMerged: false, conflict: false, output, repos? }` — clean local merge; child archived + team torn down.

  - `{ merged: false, alreadyMerged: true, conflict: false, output, repos? }` — already merged locally; child archived + team torn down.

  - 409 `{ merged: false, alreadyMerged: false, conflict: true, output, repos? }` — merge conflict; child stays live.

  `repos`, when present, maps each matching component repo to its local merge outcome. Component repositories merge sequentially. If a later component conflicts, any earlier successful local merges remain applied; they are not destructively rolled back. The child stays live so the conflict can be repaired and the merge retried.

  This tool is local-only and does not publish either branch. Publication, when explicitly requested elsewhere, is a separate operation.

  ## Parameters


  - `childGoalId` (required) — id of the child goal to merge.

  - `force` (optional boolean, default false) — bypass the
    `ready-to-merge` gate check. Use when the child's workflow has no
    `ready-to-merge` gate, or when you (or the human operator) have
    determined it is safe to merge. The `git merge --no-ff` operation
    itself still runs; conflicts still surface as a 409 with
    `{ conflict: true, output }`.
