name: preview_open
description: "Open the live preview panel with HTML content"
summary: "Open or update the live preview side-panel with HTML content. The panel auto-refreshes on subsequent calls."
provider:
  type: bobbit-extension
  extension: extension.ts
group: HTML
docs: |-
  Pass `html` for inline content or `file` to load from disk. Use for design mockups, data visualizations, and interactive prototypes.
detail_docs: |-
  ## Purpose

  Open the live preview side-panel in the Bobbit UI with HTML content. The panel splits the screen alongside the chat, showing a live-rendered iframe. Each subsequent call to `preview_open` updates the content in-place — the panel polls for changes every second.

  This replaces the manual workflow of calling gateway APIs, managing session IDs, and writing to specific file paths.

  ## Parameters

  | Name | Type | Required | Description |
  |------|------|----------|-------------|
  | `html` | string | No (one of html/file required) | Raw HTML content to render in the preview panel. |
  | `file` | string | No (one of html/file required) | Path to an HTML file on disk to load into the preview. |

  If both are provided, `html` takes precedence.

  ## When to Use

  - **Design mockups** — show UI proposals, component variations, animation demos.
  - **Data visualizations** — render charts, tables, dashboards inline.
  - **Interactive prototypes** — let the user explore states, toggle options, adjust parameters.
  - **Iterative development** — update the preview repeatedly as you refine the HTML.

  ## When NOT to Use

  - **Static file output** — if the user just wants an HTML file saved, use `write` instead. Files written with `.html` extension render inline in the chat automatically.
  - **Screenshots or images** — use `browser_screenshot` for capturing rendered pages.

  ## Examples

  ```
  # Show inline HTML in the preview panel
  preview_open(html="<h1>Hello</h1><p>This appears in the side panel</p>")

  # Load an existing HTML file into the preview
  preview_open(file="mockups/dashboard.html")

  # Update the preview with new content (panel stays open)
  preview_open(html="<h1>Updated</h1><p>Content refreshed automatically</p>")
  ```

  ## Theme Integration

  The preview panel automatically inherits the app's theme. A bridge script injected into every preview iframe syncs:
  - The `.dark` class (light/dark mode)
  - The `data-palette` attribute (color palette)
  - All CSS custom properties (`--background`, `--foreground`, `--border`, `--muted`, etc.)
  - The app's font stack

  Changes are live — toggling dark/light mode in the app instantly updates the preview.

  **Default behavior: match the app theme.** Unless the user explicitly asks for a different style, always write preview HTML that uses the inherited CSS variables rather than hardcoded colors. This makes previews feel integrated into the app.

  ```html
  <!-- DO: use CSS variables from the app (variables already contain full oklch values) -->
  <body style="background: var(--background); color: var(--foreground);">
    <div style="border: 1px solid var(--border); padding: 16px;">
      Content that matches the app theme
    </div>
    <!-- For alpha/transparency, use color-mix: -->
    <div style="background: color-mix(in oklch, var(--primary) 10%, transparent);">
      Translucent primary
    </div>
  </body>

  <!-- DON'T: hardcode colors -->
  <body style="background: #1a1a2e; color: #e0e0e0;">
  <!-- DON'T: double-wrap oklch (variables already contain oklch()) -->
  <body style="background: oklch(var(--background));">
  ```

  Key variables: `--background`, `--foreground`, `--border`, `--primary`, `--accent`, `--muted`, `--muted-foreground`, `--card`, `--sidebar`, `--ring`, `--input`, `--secondary`. All contain full `oklch(...)` values — use them directly with `var()`.

  For full Bobbit styling, reference the app CSS directly (same-origin):
  ```html
  <link rel="stylesheet" href="/src/ui/app.css">
  ```

  For interactive tools, reports, or dashboards that the agent builds for the user, the default is always to inherit the theme. Only use custom styling when the user requests a specific look or when the preview is showing a mockup of an external product.

  ## Notes / Gotchas

  - **Same-origin with Vite dev server** — the preview iframe can reference real app CSS via `<link rel='stylesheet' href='/src/ui/app.css'>` for pixel-accurate mockups.
  - **Auto-updates** — the panel polls every second. Multiple rapid calls are fine; only the latest content is shown.
  - **One preview per session** — each session has its own preview. Switching sessions shows the correct preview.
  - **Fullscreen mode** — the user can click the maximize icon in the preview panel header to expand the preview to fill the main area, with a compact prompt bar at the bottom. Press Escape to exit fullscreen.
