name: team_prompt
description: "Default-steered follow-up to a team agent, your own team_delegate child, or a direct-child goal's team-lead. Use mode: prompt for normal next-turn queue semantics."
summary: "Prompt or steer a team agent"
params: [session_id, message, mode?, workflowGateId?, inputGateIds?]
