docs: |-
  Send a follow-up user message to an existing agent. Default delivery mode is `steer`: inject into the current turn when streaming, or queue a steered prompt when not streaming. Use `mode: "prompt"` for normal next-turn prompt semantics. Supports `workflowGateId`/`inputGateIds` for context injection.
detail_docs: >-
  ## Purpose


  Send a follow-up message to a team agent, a direct-child goal's team-lead, or
  your own `team_delegate` child. By default, `team_prompt` uses **steered**
  delivery: it injects into the current turn when the target is streaming, and
  otherwise queues a steered prompt so existing steered recovery semantics apply.


  Use `mode: "prompt"` when you explicitly want normal prompt behavior: if the
  agent is idle the prompt starts a new turn immediately; if it is busy the
  prompt is queued and delivered when the current turn finishes.


  This is the standard way to give an agent additional tasks, ask questions,
  provide feedback/corrections, or nudge a running turn without falling back to
  the legacy `team_steer` tool.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `session_id` | string | **Yes** | Session ID of the agent to prompt (from
  `team_list`, `team_wait`, or a direct child goal lead). |

  | `message` | string | **Yes** | Message to deliver. |

  | `mode` | `"prompt" \| "steer"` | No | Delivery mode. Default is
  `"steer"`. Use `"prompt"` for normal next-turn queue semantics. |

  | `workflowGateId` | string | No | Gate the agent works toward;
  auto-injects upstream gate content. |

  | `inputGateIds` | string[] | No | Override DAG: gate IDs whose content to
  inject as context. |


  ## When to Use


  - **Routine nudges while active** â€” default `mode: "steer"` redirects a
  running turn without needing `team_steer`.

  - **Follow-up tasks** â€” use `mode: "prompt"` when you want a fresh next turn
  after the current work finishes.

  - **Requesting changes** â€” ask an agent to revise its work based on review
  feedback.

  - **Status checks** â€” ask an agent what it has accomplished and whether it's
  blocked.

  - **Providing information** â€” give an agent additional context or answers to
  questions it raised.

  - **Context injection** â€” attach workflow gate context with
  `workflowGateId`/`inputGateIds` in either mode.


  ## When NOT to Use


  - **Compatibility-only mid-turn steering** â€” `team_steer` remains available
  for older workflows that require the legacy streaming-only behavior, but
  routine nudges should use `team_prompt(mode="steer")` or omit `mode`.

  - **Agent should be terminated** â€” use `team_dismiss` to remove agents you no
  longer need.


  ## Your own `team_delegate` children


  `team_prompt` also sends to a **non-goal owner's OWN `team_delegate` child**
  (the non-goal verb is registered by `defaults/tools/agent/extension.ts` and
  routed through `/orchestrate/*`). Own-child scoping is enforced server-side â€”
  you can only prompt children you spawned. The same `mode` defaults and
  semantics apply.


  ## Direct-child team-leads


  In addition to your own team's sessions, `team_prompt` accepts the team-lead
  session of a **direct child goal** of your own goal. This lets a parent
  team-lead send a message to a subgoal's team-lead without falling back to raw
  session APIs.


  Scope is **direct children only** â€” grandchildren and arbitrary descendants
  return 403 `NOT_TEAM_MEMBER_OR_DIRECT_CHILD`. The asymmetry with
  `team_steer` / `team_abort` / `team_dismiss` (which act on your own team
  agents and your own `team_delegate` children, but never on a child goal's
  team) is intentional: destructive operations on a subgoal go through
  `goal_pause` / `goal_archive_child`, not direct session manipulation.


  ## Examples


  ```

  # Default: steer/nudge a running coder, or queue a steered prompt if idle

  team_prompt(session_id="abc123", message="Before continuing, make sure the new endpoint validates mode strictly.")


  # Normal next-turn prompt semantics

  team_prompt(session_id="abc123", mode="prompt", message="When you're done, add JSDoc comments to exported functions.")


  # Send revision feedback with workflow context

  team_prompt(session_id="abc123", mode="prompt", workflowGateId="implementation", inputGateIds=["review-findings"], message="Address the reviewer findings and summarize the fixes.")

  ```


  ## Notes / Gotchas


  - **Who can prompt** â€” a team lead prompts its team agents (and a direct-child
  goal's team-lead); any owner (goal or non-goal) can prompt its own
  `team_delegate` children. Server-enforced scoping applies in both cases.

  - **Default is steer** â€” omitting `mode` is equivalent to `mode: "steer"`.
  Use `mode: "prompt"` only when you want a normal next-turn prompt.

  - **Prompt mode starts a new turn** â€” unlike steered delivery, prompt mode
  does not inject into the current turn.

  - **Be specific** â€” include file paths, gate references, and clear acceptance
  criteria. The agent may have compacted earlier context and lost details.
