docs: |-
  Terminate and archive one agent. For a **goal team agent**, use after its work is merged — it removes the agent's git worktree. For your own **`team_delegate` child** (which runs in your worktree, no sub-branch), it just terminates + archives the child. To dismiss all goal agents at once, use `team_complete`.
detail_docs: >-
  ## Purpose


  Terminate and archive a specific agent. The verb covers two cases:


  - **Goal team agent** (team lead) — kills the agent's session and removes its
  isolated git worktree (the agent runs on its own goal sub-branch). Verify its
  work is merged first, or the worktree contents are lost.

  - **Your own `team_delegate` child** (any owner) — terminates and archives the
  child. The child runs in YOUR worktree (shared parent `cwd`), so there is no
  sub-branch or worktree to clean up. Own-child scoping is enforced server-side.


  In both cases the agent is permanently removed and its session archived.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `session_id` | string | **Yes** | The session ID of the agent to dismiss \u2014
  a team agent (from `team_list`) or your own `team_delegate` child (id from
  `team_wait` / a `non_blocking` spawn). |


  ## When to Use


  - **Agent completed its task** — the agent has finished, merged its work, and
  is idle.

  - **Agent is stuck or broken** — the agent is producing incorrect output or is
  in an unrecoverable state.

  - **Resource management** — freeing up resources by removing agents that are
  no longer needed.

  - **Replacing an agent** — dismiss the old one before spawning a replacement.


  ## When NOT to Use


  - **Agent hasn't merged its work** — ensure the agent has pushed and merged
  changes to the goal branch first, or the work will be lost with the worktree.

  - **Dismissing all agents** — use `team_complete` instead for a clean
  end-of-goal dismissal.


  ## Examples


  ```

  # Dismiss a coder that has finished and merged its work

  team_dismiss(session_id="abc123-def456-789")


  # Dismiss a stuck agent to replace with a new one

  team_dismiss(session_id="stuck-agent-session-id")

  ```


  ## Notes / Gotchas


  - **Who can dismiss** — a team lead dismisses its goal team agents; any owner
  (goal or non-goal) can dismiss its own `team_delegate` children. You cannot
  dismiss an agent you do not own (server-enforced).

  - **Irreversible** — the agent's session is killed and archived. For a goal
  team agent its worktree is deleted; any uncommitted or unmerged work is lost.

  - **Verify merge first (goal team agents)** — confirm the agent merged its
  changes back to the goal branch before dismissing. Check with `team_list` or
  review the git log. (A `team_delegate` child shares your worktree, so there is
  nothing separate to merge.)

  - **Worktree cleanup** — a goal team agent's isolated git worktree directory
  is removed automatically; a `team_delegate` child has none (it shared yours).
