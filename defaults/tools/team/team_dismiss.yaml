name: team_dismiss
description: "Dismiss one team or owned child agent; returns structured DismissResult with retryable/idempotent status."
summary: "Terminate one agent (team or own child)"
params: [session_id]
provider:
  type: bobbit-extension
  extension: extension.ts
# Reclassified Team→Agent (Orchestration Core sub-goal A) — own-children
# orchestration verb; allow-by-default, server-side own-children scoping.
# See tests/role-team-tools-policy.test.ts.
group: Agent
renderer: src/ui/tools/renderers/TeamToolRenderers.ts
docs: |-
  Terminate and archive one agent: a goal team agent, or your own `team_delegate` child. The result is always a structured `DismissResult` with `ok`, `status`, `sessionId`, `message`, and `retryable`. Duplicate owned dismisses are idempotent `already-dismissed` successes and should not be retried.
detail_docs: >-
  ## Purpose


  Terminate and archive a specific agent. The verb covers two cases:


  - **Goal team agent** (team lead) — kills the agent's session and removes its
  isolated git worktree (the agent runs on its own goal sub-branch). Verify its
  work is merged first, or the worktree contents are lost.

  - **Your own `team_delegate` child** (any owner) — terminates and archives the
  child. The child runs in YOUR worktree (shared parent `cwd`), so there is no
  sub-branch or worktree to clean up. Own-child scoping is enforced server-side.


  ## Result Contract


  `team_dismiss` returns a structured `DismissResult` in tool text and details:


  ```ts
  {
    ok: boolean;
    status: "dismissed" | "already-dismissed" | "not-owned" | "not-found" | "failed";
    sessionId: string;
    message: string;
    retryable: boolean;
  }
  ```


  | Status | Meaning | Retry? |
  |--------|---------|--------|
  | `dismissed` | The owned live target was terminated and archived. | No |
  | `already-dismissed` | The caller owns or previously owned the target, but it is already not live or archived. Duplicate dismiss requests land here as idempotent success. | No |
  | `not-owned` | The target exists but does not belong to the caller/goal, or the caller is not allowed to dismiss it. | No |
  | `not-found` | No live, archived, or remembered session exists for that id. | No |
  | `failed` | Termination/archive failed or the gateway returned an unstructured failure. | Follow `retryable` |


  Never retry just because `ok` is `false`. Inspect `status` and `retryable`.
  `already-dismissed` has `ok:true` and `retryable:false`; it confirms cleanup is
  already complete.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `session_id` | string | **Yes** | The session ID of the agent to dismiss —
  a team agent (from `team_list`) or your own `team_delegate` child (id from
  `team_wait` / a `non_blocking` spawn). |


  ## When to Use


  - **Agent completed its task** — the agent has finished, merged its work, and
  is idle.

  - **Agent is stuck or broken** — the agent is producing incorrect output or is
  in an unrecoverable state.

  - **Resource management** — freeing up resources by removing agents that are
  no longer needed.

  - **Replacing an agent** — dismiss the old one before spawning a replacement.


  ## When NOT to Use


  - **Agent hasn't merged its work** — ensure the agent has pushed and merged
  changes to the goal branch first, or the work will be lost with the worktree.

  - **Dismissing all agents** — use `team_complete` instead for a clean
  end-of-goal dismissal.

  - **Already-dismissed result** — do not retry when `status` is
  `already-dismissed`; the duplicate request was handled safely.


  ## Examples


  ```

  # Dismiss a coder that has finished and merged its work

  team_dismiss(session_id="abc123-def456-789")


  # Dismiss a stuck agent to replace with a new one

  team_dismiss(session_id="stuck-agent-session-id")

  ```


  ## Notes / Gotchas


  - **Who can dismiss** — a team lead dismisses its goal team agents; any owner
  (goal or non-goal) can dismiss its own `team_delegate` children. You cannot
  dismiss an agent you do not own; the result is `not-owned` with
  `retryable:false`.

  - **Irreversible** — the agent's session is killed and archived. For a goal
  team agent its worktree is deleted; any uncommitted or unmerged work is lost.

  - **Verify merge first (goal team agents)** — confirm the agent merged its
  changes back to the goal branch before dismissing. Check with `team_list` or
  review the git log. (A `team_delegate` child shares your worktree, so there is
  nothing separate to merge.)

  - **Duplicate/idempotent behavior** — a repeated dismiss of an owned target
  returns `already-dismissed` instead of an ambiguous `{ ok:false }` and should
  not trigger another retry.

  - **Worktree cleanup** — a goal team agent's isolated git worktree directory
  is removed automatically; a `team_delegate` child has none (it shared yours).
