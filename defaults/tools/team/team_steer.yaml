name: team_steer
description: "Backward-compatible streaming-only mid-turn redirect; prefer team_prompt(mode=\"steer\") for routine nudges"
summary: "Legacy mid-turn redirect to a running agent"
params: [session_id, message]
provider:
  type: bobbit-extension
  extension: extension.ts
# Reclassified Team→Agent (Orchestration Core sub-goal A) — own-children
# orchestration verb; allow-by-default, server-side own-children scoping.
# See tests/role-team-tools-policy.test.ts.
group: Agent
renderer: src/ui/tools/renderers/TeamToolRenderers.ts
docs: |-
  Backward-compatible streaming-only steer. The agent sees it as a user message interleaved with its current work, and the call fails if the target is idle. Prefer `team_prompt(mode="steer")` for routine nudges because it also handles idle/non-streaming targets with steered queue semantics.
detail_docs: >-
  ## Purpose


  Send a mid-turn redirect message to an agent that is currently active
  (streaming/processing). The message is injected into the agent's context as a
  system-level instruction, causing it to change course without waiting for its
  current turn to finish.


  This tool is kept for backward compatibility with older workflows that need
  the legacy streaming-only behavior. For routine nudges and current-turn
  redirection, prefer `team_prompt(mode="steer")` (or omit `mode`, since steer
  is the default) because it also handles idle/non-streaming targets by queuing
  a steered prompt.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `session_id` | string | **Yes** | Session ID of the agent to steer — a team
  agent (from `team_list`) or your own `team_delegate` child (id from
  `team_wait` / a `non_blocking` spawn). |

  | `message` | string | **Yes** | Steering instruction to inject. Should be
  clear and directive — tell the agent exactly what to do differently. |


  ## When to Use


  - **Compatibility with streaming-only steer** — use when you specifically
  need the legacy behavior that fails unless the target is actively streaming.

  - **Agent is going the wrong direction** — it's implementing the wrong
  approach, editing the wrong files, or misunderstanding the task.

  - **New information arrived** — a design doc was updated, a dependency was
  added, or requirements changed while the agent is working.

  - **Preventing wasted work** — catching a mistake early before the agent
  builds on top of it.


  ## When NOT to Use


  - **Routine nudges** — use `team_prompt(mode="steer")` or omit `mode`; it is
  the default and works for both streaming and non-streaming targets.

  - **Agent is idle** — use `team_prompt(mode="steer")` for steered queue
  semantics, or `team_prompt(mode="prompt")` for a normal next-turn prompt.
  `team_steer` fails with an error if the agent is not actively streaming.

  - **Routine follow-up tasks** — if the agent finished correctly and you want
  to assign more work, use `team_prompt(mode="prompt")`.

  - **Non-urgent feedback** — if the agent is on the right track and you just
  have minor suggestions, wait for it to finish and use `team_prompt`.


  ## Examples


  ```

  # Redirect an agent that's editing the wrong file

  team_steer(session_id="abc123", message="STOP — you're editing server.ts but
  the route handlers moved to router.ts in the last refactor. Check
  src/server/router.ts instead.")


  # Update an agent with new requirements

  team_steer(session_id="abc123", message="The design doc was just updated. The
  API should return 404 for unknown tools, not 200 with empty object. Check the
  latest gate content.")


  # Prevent over-engineering

  team_steer(session_id="abc123", message="Keep it simple — don't add caching
  yet. Just implement the basic GET/PUT endpoints per the spec. We'll optimize
  later.")

  ```


  ## Notes / Gotchas


  - **Works on your own agents/children** — a team lead steers its team agents;
  any owner steers its own `team_delegate` children. Own-child scoping is
  enforced server-side; you cannot steer a foreign session.

  - **Agent must be active** — legacy steering an idle agent fails with an
  error. Prefer `team_prompt(mode="steer")` if you want idle/non-streaming
  targets to receive a queued steered prompt instead.

  - **Injected as system message** — the steer message has high priority in the
  agent's context. The agent should see and respond to it promptly.

  - **No guarantee of immediate effect** — the agent may be mid-tool-call when
  the steer arrives. It will pick up the message when it next reads from its
  context.

  - **Be directive** — vague steering messages are less effective. Tell the
  agent exactly what to stop doing and what to do instead.
