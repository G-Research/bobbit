description: "Force-abort one stuck agent — a team agent or your own team_delegate child; graceful, then kill, then restart."
summary: "Force-abort one agent (team or own child)"
params: [session_id]
provider:
  type: bobbit-extension
  extension: extension.ts
# Reclassified Team→Agent (Orchestration Core sub-goal A) — own-children
