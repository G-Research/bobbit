name: verification_result
description: "Submit verification result — verdict, summary, and optional HTML report"
summary: "Submit your verification result when review or QA testing is complete."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Gates
docs: |
  Submit verdict, summary, and optional HTML report. Required params: `verdict` ("pass"/"fail"), `summary` (detailed markdown).
  For HTML reports with screenshots: use `report_html_file` (absolute path, server reads directly, up to 10MB) OR `report_html` (inline string for small reports). Never both.
detail_docs: |
  ## Summary Format

  The `summary` field should be **detailed markdown** covering:
  - **What was reviewed** — which files, components, or areas were examined
  - **Specific findings** — with file paths and line numbers where relevant (e.g. `src/server/foo.ts:42`)
  - **Verdict rationale** — why the review passes or fails

  ### Good pass summary example:
  ```
  ## Review Summary
  
  Reviewed 12 files across `src/server/` and `src/ui/` for the new feature.
  
  ### Findings
  - **No critical issues found**
  - Minor: `src/server/handler.ts:85` — unused import (non-blocking)
  - Style: consistent naming conventions throughout
  
  ### Verdict: PASS
  All acceptance criteria met. Implementation matches design doc.
  ```

  ### Good fail summary example:
  ```
  ## Review Summary
  
  Reviewed implementation of the verification renderer.
  
  ### Critical Issues
  1. **Missing null check** — `src/ui/tools/renderers/VerificationResultRenderer.ts:45` — `params.summary` accessed without checking if params exists during streaming
  2. **XSS vulnerability** — `report_html` rendered via unsafeHTML without sanitization
  
  ### Verdict: FAIL
  2 critical issues must be resolved before merge.
  ```

  ## HTML Report (QA agents)

  QA agents can attach a self-contained HTML report with embedded screenshots. Two mutually exclusive options:

  - **`report_html`** — inline HTML string. Use for small reports without screenshots.
  - **`report_html_file`** — absolute path to an HTML file on disk. The server reads it directly (up to 10 MB). **Preferred for reports with embedded base64 screenshots**, which are too large for inline parameters.

  Provide one or the other, never both — the tool will reject the call if both are set.

  The report appears as a "View Report" button on the goal dashboard, opening in a new tab.

  ### Notes
  - Most reviewers only need `summary` — the HTML report fields are primarily for QA agents
  - Use headings, bullet lists, and code blocks in `summary` for readability
