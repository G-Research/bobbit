name: delegate
description: "Run a task in a separate agent process"
summary: "Run a task in a separate agent process with full tool access but
  isolated context."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Agent
renderer: src/ui/tools/renderers/DelegateRenderer.ts
docs: |-
  Instructions must be self-contained — delegate has NO conversation context. Use `parallel` array for concurrent execution. 10min default timeout. Each delegate spawns an entire agent process with its own system prompt, costing thousands of tokens before it does anything. Never delegate to gather information — use parallel `read`/`grep`/`bash` calls instead, which are near-instant and return results directly into your context.
detail_docs: >-
  ## Purpose


  Spawn an isolated agent subprocess to execute a task independently. The
  delegate agent gets full tool access (bash, read, write, edit, web search,
  browser tools) but receives **only the instructions you provide** — it has no
  access to the current conversation history, messages, or context.


  The delegate runs as a completely separate process and blocks the caller until
  it finishes. Its final output is returned as the result. This enables two key
  patterns: **context isolation** (the delegate can't see sensitive conversation
  content) and **mass parallelism** (multiple delegates run concurrently).


  The `parallel` parameter accepts an array of instruction objects to spawn
  multiple delegates simultaneously. All run concurrently and the tool returns
  when all complete.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `instructions` | string | Optional (provide either `instructions` or
  `parallel`) | Detailed task instructions for a single delegate. Must be
  self-contained — the delegate has no other context. |

  | `context` | object | No | Key-value pairs of additional context passed to
  the delegate (e.g., file paths, error messages, configuration). |

  | `parallel` | array | Optional (provide either `instructions` or `parallel`)
  | Array of `{ instructions: string, context?: object }` objects. Each spawns
  an independent delegate. All run concurrently. |

  | `timeout_minutes` | number | No | Maximum execution time in minutes.
  Default: **10 minutes**. |


  ## Cost

  Each delegate spawns a full agent process with its own system prompt (~15K+
  tokens), tool definitions, and conversation context. A delegate that reads
  one file costs thousands of input tokens just to boot — the same `read` call
  inline costs zero overhead. Three parallel delegates to read three files
  cost ~45K+ tokens in system prompts alone; three parallel `read` calls cost
  nothing extra.

  There is no parallelism gain either — the delegate results return as tool
  results that you read sequentially in your own context. You pay for the
  content twice: once in the delegate's context window, and again in yours
  when you read the result. Parallel `read`/`grep` calls skip the middleman
  — the results appear directly in your context, once.

  **The decision threshold:** delegate only when the *work* the delegate does
  (analysis, code changes, multi-step investigation) justifies the startup
  cost. If the result is just file contents or grep output, do it inline.


  ## When to Use


  - **Context isolation** — when the delegate must NOT see the current
  conversation (e.g., independent code review, unbiased analysis).

  - **Independent multi-step work** — tasks requiring their own chain of
  read → analyze → write → verify, where the intermediate steps are not
  useful to the parent (e.g., fixing a bug in module A while you work on
  module B).

  - **Mass parallelism with real work** — 3+ independent sub-tasks that each
  involve multiple tool calls and reasoning (e.g., reviewing different
  modules, implementing non-overlapping features).


  ## When NOT to Use


  - **Gathering information** — never delegate to read files, grep for
  patterns, run a command, or fetch a URL. These tools are available to you
  directly. Launch parallel `read`/`grep`/`bash` calls in a single message
  — they run concurrently, return instantly, and add results directly to
  your context. Delegating the same work is 10-100x more expensive and
  slower.

  - **Single tasks you can do yourself** — if there's no need for isolation
  or parallelism, do the work inline. "The task is complex" or "the task
  is long" are NOT valid reasons to delegate.

  - **Tasks that need your conversation context** — delegates have NO access
  to the current conversation. If the task requires understanding prior
  decisions, user preferences, or earlier analysis, do it yourself or
  include all relevant context in the instructions.


  ## Examples


  ```

  # Context-isolated code review (single delegate with instructions)

  delegate(instructions="Review the changes in src/server/auth/ for security
  vulnerabilities. The branch has modifications to token validation, rate
  limiting, and TLS setup. Check for: injection attacks, timing attacks,
  insecure defaults, missing validation. Report findings as structured markdown
  with severity levels.")


  # Parallel analysis of independent modules

  delegate(parallel=[
    { instructions: "Analyze src/server/ for error handling gaps. Check every async function for missing try/catch, unhandled promise rejections, and error propagation. Report as markdown." },
    { instructions: "Analyze src/ui/ for accessibility issues. Check for missing ARIA labels, keyboard navigation, color contrast, and screen reader compatibility. Report as markdown." },
    { instructions: "Analyze src/app/ for memory leak risks. Check for unremoved event listeners, unclosed connections, growing arrays, and retained references. Report as markdown." }
  ])


  # Delegate with context

  delegate(
    instructions="Fix the failing E2E test. The test expects a 200 response but gets 404. Check the API route handler and the test setup.",
    context={ testFile: "tests/e2e/tools-api.spec.ts", errorLine: "42", endpoint: "/api/tools/bash" }
  )


  # Parallel documentation generation

  delegate(parallel=[
    { instructions: "Write comprehensive JSDoc comments for all exported functions in src/server/agent/session-manager.ts" },
    { instructions: "Write comprehensive JSDoc comments for all exported functions in src/server/agent/goal-manager.ts" },
    { instructions: "Write comprehensive JSDoc comments for all exported functions in src/server/agent/task-manager.ts" }
  ])

  ```


  ## Notes / Gotchas


  - **Instructions must be self-contained** — the delegate sees ONLY what you
  put in `instructions` and `context`. It has no conversation history, no
  knowledge of prior decisions, no awareness of other delegates. Include all
  necessary file paths, requirements, and context.

  - **Significant overhead** — each delegate spawns an entire agent process.
  Only delegate when the isolation or parallelism benefit justifies this cost.

  - **Provide `instructions` or `parallel`, not both** — use `instructions` for
  a single delegate, `parallel` for multiple concurrent delegates. Neither is
  strictly required at the schema level, but one must be provided at runtime.

  - **10-minute default timeout** — delegates that exceed the timeout are
  killed. Increase `timeout_minutes` for longer tasks.

  - **Blocking** — the `delegate` tool blocks until all delegates finish. Plan
  accordingly for long-running delegates.

  - **No inter-delegate communication** — parallel delegates cannot talk to each
  other. They run independently and their results are collected when all finish.

  - **Full tool access** — delegates can read, write, edit, run bash, search the
  web, and use browser tools. They can make changes to the filesystem.

  - **File conflicts in parallel** — if multiple parallel delegates edit the
  same file, the last write wins. Design parallel tasks to work on independent
  files.
