name: lsp_references
description: "Find references. Pass symbolName OR (path, line, char). Prefer over grep for callsites. 0-indexed."
summary: "Find references (LSP)"
params: [path?, symbolName?, line?, character?, includeDeclaration?]
provider:
  type: bobbit-extension
  extension: extension.ts
group: LSP
renderer: src/ui/tools/renderers/LspReferencesRenderer.ts
docs: |-
  100× cheaper than grep when you need every caller of a symbol. line/character are 0-indexed.
detail_docs: >-
  ## Purpose


  List every reference to the symbol at `(path, line, character)`.
  Includes the declaration itself by default; pass `includeDeclaration: false`
  to omit it.


  ## Parameters


  | Name | Type | Required | Description |
  |------|------|----------|-------------|
  | `path` | string | No | File path relative to session cwd. Required with line/char; otherwise a hint for `symbolName`. |
  | `symbolName` | string | No | Resolve position via `lsp_workspace_symbol`; alternative to `(line, character)`. |
  | `line` | number | No | **0-indexed** line. Required when not using `symbolName`. |
  | `character` | number | No | **0-indexed** column. Required when not using `symbolName`. |
  | `includeDeclaration` | boolean | No | Default `true`. |


  ## Symbol-name shorthand


  Pass `symbolName` instead of `(line, character)`. Shorthand results
  are decorated with `resolvedFrom: { symbolName, matched }`. Ambiguous
  matches without a `path` hint return `{ ambiguous: true, candidates: [...] }`.


  Each result is `{ path, range: { start: {line, character}, end: {line, character} } }`,
  with `path` relative to session cwd.
