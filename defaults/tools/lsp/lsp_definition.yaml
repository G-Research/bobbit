name: lsp_definition
description: "Go to definition. Pass symbolName OR (path, line, char). Prefer over grep+read. 0-indexed."
summary: "Go to definition (LSP)"
params: [path?, symbolName?, line?, character?]
provider:
  type: bobbit-extension
  extension: extension.ts
group: LSP
renderer: src/ui/tools/renderers/LspDefinitionRenderer.ts
docs: |-
  Cheaper than grep+read for symbol lookups. line/character are 0-indexed (LSP-native; `read` is 1-indexed).
detail_docs: >-
  ## Purpose


  Resolve the declaration site of the symbol at `(path, line, character)`
  using the worktree's language server. For TypeScript, this follows
  re-exports and type-alias chains.


  ## Parameters


  | Name | Type | Required | Description |
  |------|------|----------|-------------|
  | `path` | string | No | File path relative to session cwd. Required with line/char; otherwise a hint for `symbolName`. |
  | `symbolName` | string | No | Resolve position via `lsp_workspace_symbol`; alternative to `(line, character)`. |
  | `line` | number | No | **0-indexed** line. Required when not using `symbolName`. |
  | `character` | number | No | **0-indexed** column. Required when not using `symbolName`. |


  ## Symbol-name shorthand


  Pass `symbolName` instead of `(line, character)` to skip the
  `lsp_workspace_symbol` round-trip. The tool resolves the symbol
  internally and returns the underlying result decorated with a
  `resolvedFrom: { symbolName, matched }` field. If multiple symbols
  share the name, supply `path` as a hint or expect an
  `{ ambiguous: true, candidates: [...] }` response.


  ## When to Use


  - Finding a function's signature before calling it.
  - Following `import` chains without manual grep.


  ## When NOT to Use


  - To find *callers* — use `lsp_references`.
  - Pure text/regex search — use `grep`.


  Returns `null` when no definition is found, or `{ error: "lsp_unavailable", ... }`
  when the language server cannot be started; fall back to grep in that case.
