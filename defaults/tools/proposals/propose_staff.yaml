name: propose_staff
description: "Submit staff proposal with name and prompt"
summary: "Propose a staff member"
params: [name, prompt, description?, triggers?, cwd?, role?]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Proposals
docs: >-
  Parameters: name (required), prompt (required), description, triggers, cwd,
  role. The optional role attaches a role to the staff agent: it prepends the
  role's prompt context to the staff agent's system prompt and pre-fills the
  accessory. Only pass a role that exists.
