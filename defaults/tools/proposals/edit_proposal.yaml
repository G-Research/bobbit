name: edit_proposal
description: "Replace old_text with new_text in a proposal draft"
summary: "Surgically edit a proposal draft via exact-text replace"
params: [type, old_text, new_text]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Proposals
docs: >-
  Parameters: type (required) — one of goal, project, role, tool, staff,
  workflow, skill; old_text (required); new_text (required, may be empty).
  Failed edits do NOT modify the file on disk.

  WORKFLOWS: two ways to edit a workflow's gates/verify-steps depending on
  which proposal is in flight — a standalone `propose_workflow` draft
  (type="workflow", one workflow) or the `workflows:` key inside a
  `propose_project` draft (type="project", the whole project record). Edit
  whichever one you actually seeded; they are independent drafts.
