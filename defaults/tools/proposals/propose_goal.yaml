name: propose_goal
description: "Submit a goal proposal for user review. This is THE canonical (and only) tool for creating a new goal — there is no separate create_goal tool. The user reviews the proposed title, spec, workflow choice, and options, then accepts to spawn a team-lead session that begins working on the goal. To tweak fields of an in-flight draft without re-emitting the whole payload, follow up with edit_proposal(type=\"goal\", ...)."
summary: "Propose a goal — title, spec (acceptance criteria), workflow choice, and options. Once accepted, Bobbit spawns the goal's worktree + team-lead and begins execution."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Proposals
docs: >-
  Required parameters: title (short human-readable goal name — used in branch
  names and the sidebar), spec (the full specification including acceptance
  criteria — agents will use this to drive workflow gates and verification).

  Optional parameters: cwd (project path the goal runs against — defaults to
  the registered project for this session), workflow (workflow id to use; see
  GET /api/workflows?projectId=... for available workflows; if omitted, the
  user picks one in the proposal panel), options (object: e.g. suggestedRole
  to hint a team-lead role).

  Custom workflows: this tool only references existing workflows by id. To
  CREATE or update a workflow before proposing a goal that uses it, use
  propose_project with the new workflow inside the `workflows:` field.

  Custom roles: similarly, to define a role referenced by the chosen workflow's
  verify[] steps, use propose_role first.
