name: view_proposal
description: "Return current draft contents or structured error"
summary: "View the current proposal draft"
params: [type]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Proposals
docs: >-
  Parameters: type (required) — one of goal, project, role, tool, staff.
  Note: there is NO "workflow" proposal type — workflows live inside a
  `project` proposal under the `workflows:` field. To view or edit
  workflows mid-session, use type="project".
