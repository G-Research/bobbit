name: view_proposal
description: "Read the current draft of a proposal file for the active session"
summary: "View the current proposal draft. Returns the file contents (markdown or YAML), or a structured error if no proposal of this type has been emitted yet."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Proposals
docs: >-
  Parameters: type (required) — one of goal, project, role, tool, staff.
  Note: there is NO "workflow" proposal type — workflows live inside a
  `project` proposal under the `workflows:` field. To view or edit
  workflows mid-session, use type="project".
