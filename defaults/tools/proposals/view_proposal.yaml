name: view_proposal
description: "Return current draft contents or structured error"
summary: "View the current proposal draft"
params: [type]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Proposals
docs: >-
  Parameters: type (required) — one of goal, project, role, tool, staff,
  workflow, skill. A workflow may be in flight as either a standalone
  `propose_workflow` draft (type="workflow") or nested inside a
  `propose_project` draft under its `workflows:` field (type="project") —
  view whichever one you actually seeded.
