name: ask_user_choices
description: "Post 1–5 multiple-choice questions to the user as an inline widget. Non-blocking: the tool returns immediately; the user's answers arrive later as a separate user message. Calling this tool ends your current turn."
summary: "Post multiple-choice questions to the user as an inline widget (non-blocking; ends your turn)."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Ask
docs: |
  Post 1–5 multiple-choice questions to the user as an inline interactive widget.

  **This tool is non-blocking.** It returns immediately with `{ status: "posted",
  tool_use_id: "<id>" }` and your current turn ends. The user's answers arrive
  later as a separate user message (see the "Non-blocking contract" section in
  detail_docs for the envelope format).
detail_docs: |
  ## Input

  ```json
  {
    "questions": [
      {
        "question": "Which layout do you prefer?",
        "options": ["Grid", "List", "Masonry"],
        "allow_other": true
      },
      ...
    ]
  }
  ```

  - **questions**: 1–5 questions
  - Each question has a **question** string, an **options** array (2–8 items), and these
    optional fields:
    - **tab_label** (string, 2–4 words, ≤24 chars) — short topical summary shown as the tab title when there are multiple questions. **Required** when `questions.length > 1`; ignored for single-question asks. Example: `"User behavior"`, `"Follow-up timing"`.
    - **allow_other** (boolean) — adds an "Other" free-text choice.
    - **multi** (boolean) — allow multiple selections; `selected` is returned as an array.
    - **min** / **max** (integers) — min/max selections when `multi` is true (defaults: 1 and options.length).

  ## Tab labels (multi-question asks)

  When you post **more than one question**, every question MUST include a
  `tab_label` field. The widget renders the tab strip as
  `A. <tab_label>`, `B. <tab_label>`, … so the user can jump between
  questions without re-reading the full prompt.

  Keep it to **2–4 words, ≤24 characters**, topical and question-scoped
  — not the full question.

  ```json
  {
    "questions": [
      { "question": "How often do users retry failed logins?", "tab_label": "User behavior", "options": ["Rarely", "Sometimes", "Often"] },
      { "question": "Should we show a CAPTCHA after 3 failures?",  "tab_label": "CAPTCHA policy", "options": ["Yes", "No", "Only for flagged IPs"] }
    ]
  }
  ```

  Single-question asks do not need `tab_label` (the tab strip is hidden).

  ## Non-blocking contract

  Calling `ask_user_choices` returns immediately with:

  ```json
  { "status": "posted", "tool_use_id": "<id>" }
  ```

  This ends your turn. **Do not emit further reasoning or tool calls in the
  same turn after posting** — the user has nothing to react to yet.

  The user's answers arrive in a LATER turn as a user message whose text is
  exactly:

  ```
  [ask_user_choices_response tool_use_id=<same id as above>]
  {"answers":[{"question":"...","selected":"...","other_text":null}, ...]}
  ```

  When you see a user message starting with `[ask_user_choices_response
  tool_use_id=...]`, parse the JSON on the following line(s) to get the
  answers. Match `tool_use_id` to the tool call you previously made. If the
  user sends an unrelated message instead, they chose not to answer — proceed
  without the answers (or re-ask by calling the tool again).

  **Never emit the `[ask_user_choices_response ...]` marker yourself** — it is
  reserved for the user/UI layer.

  ## Answer shape

  Single-select (default):

  ```json
  {
    "answers": [
      { "question": "...", "selected": "Grid",  "other_text": null },
      { "question": "...", "selected": "Other", "other_text": "user's typed text" }
    ]
  }
  ```

  Multi-select (`multi: true`) — `selected` is always an array; may contain "Other":

  ```json
  {
    "answers": [
      { "question": "...", "selected": ["Grid", "List"],        "other_text": null },
      { "question": "...", "selected": ["List", "Other"],       "other_text": "user's typed text" }
    ]
  }
  ```
