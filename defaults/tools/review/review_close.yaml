name: review_close
description: "Close one tab by title or all tabs"
summary: "Close review document tabs"
params: [title?]
provider:
  type: bobbit-extension
  extension: extension.ts
group: Review
detail_docs: |-
  ## Parameters
  | Name | Type | Required | Description |
  |------|------|----------|-------------|
  | title | string | No | Close specific tab. Omit to close all tabs. |
  
  ## Examples
  ```
  review_close(title="Architecture")
  review_close()
  ```
