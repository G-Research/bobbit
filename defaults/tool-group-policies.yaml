Ask: allow
# Skills group: gates the `activate_skill` tool, which lets the model autonomously
# invoke any discovered slash skill mid-turn (Agent Skills level-1 progressive
# disclosure). Set to `never` project-wide to suppress autonomous activation;
# the system prompt's "Available Skills" catalog is then also omitted, since the
# catalog is useless without an activator. User-typed `/<name>` invocations are
# unaffected by this policy.
Skills: allow
# MCP server groups default to `allow` like every other tool group — no
# builtin denials here. Projects/users opt out of a specific MCP server via
# `.bobbit/config/tool-group-policies.yaml` or the Tools page; roles can
# override via their `toolPolicies` (e.g. the qa-tester role still blocks
# `mcp__playwright` at the role layer to guarantee headless browser access).
# Team management tools (team_spawn, team_dismiss, team_prompt, team_steer,
# team_abort, team_complete, team_list) are team-lead-only. The team-lead role
# overrides this group default with `Team: allow`. For non-team-lead agents,
# `never` strips the tools from their allowedTools (and from their tool-docs
# system prompt), avoiding context bloat and removing the temptation to spawn
# agents from a worker session — where the tool wouldn't work anyway because
# the team extension is only loaded for the team-lead session.
Team: never
