Ask: allow
# Skills group: gates the `activate_skill` tool, which lets the model autonomously
# invoke any discovered slash skill mid-turn (Agent Skills level-1 progressive
# disclosure). Set to `never` project-wide to suppress autonomous activation;
# the system prompt's "Available Skills" catalog is then also omitted, since the
# catalog is useless without an activator. User-typed `/<name>` invocations are
# unaffected by this policy.
Skills: allow
# Block the @playwright/mcp browser group by default: it launches visible
# Chromium windows on the host on first use, which is disruptive and can
# steal focus. Agents should use the native `browser_*` tools (defaults/tools/browser)
# which are guaranteed headless. Projects that legitimately want a headed
# browser can override this in `.bobbit/config/tool-group-policies.yaml`
# (`mcp__playwright: allow`) and/or drop `--headless` in their own `.mcp.json`.
mcp__playwright: never
# Bobbit owns image model routing through `generate_image`, including Nano
# Banana/Gemini. The external nano-banana MCP hard-codes provider behavior and
# can drift from the configured session image model.
mcp__nano-banana: never
