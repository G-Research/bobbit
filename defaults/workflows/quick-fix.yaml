id: quick-fix
name: Quick Fix
description: Fast workflow for small changes — skip design, go straight to implementation and merge
gates:
  - id: implementation
    name: Implementation
    verify:
      - name: Build
        type: command
        timeout: 600
        run: "{{project.build_command}}"
      - name: Type check passes
        type: command
        phase: 1
        run: "{{project.typecheck_command}}"
      - name: Unit tests
        type: command
        phase: 1
        run: "{{project.test_unit_command}}"
      - name: E2E tests
        type: command
        phase: 1
        # E2E suite on Windows runs ~6-8 min under parallel-worker load; the
        # default 300s step timeout SIGTERMs the pipeline mid-run, and the
        # filter's buffered "PASSED" stdout then lands with a non-zero exit.
        # Matches the 900s timeout used in general.yaml and feature.yaml.
        timeout: 900
        run: "{{project.test_e2e_command}}"
      - name: Gap analysis
        type: llm-review
        role: spec-auditor
        phase: 2
        prompt: |-
          Compare the goal specification to the actual implementation on this branch.

          The goal spec is:
          {{goal_spec}}

          Run `git diff {{master}}...{{branch}} -- . ':!package-lock.json'` to see the implementation diff.

          Identify:
          1. Requirements in the goal spec not addressed by the changes
          2. Acceptance criteria not met by the code
          3. Implemented behavior that contradicts the specification
          4. Any unrelated or unnecessary changes
      - name: Code quality review
        type: llm-review
        role: code-reviewer
        phase: 2
        prompt: |-
          Review the code changes on branch {{branch}} vs {{master}} for quality.

          Start with `git diff --stat {{master}}...{{branch}} -- . ':!package-lock.json'` to see which files changed.
          Then use `git diff {{master}}...{{branch}} -M -- . ':!package-lock.json'` (with rename detection) to see actual content changes — this collapses pure renames into one-line summaries.
          For large diffs, review files individually with `read` rather than dumping the entire diff into context.

          Check:
          1. Correctness — logic errors, off-by-one, race conditions
          2. Error handling — missing try/catch, unhandled promise rejections
          3. Edge cases — null/undefined, empty arrays, boundary values
          4. Minimality — no unrelated changes, no dead code
          5. Test coverage — are new behaviors tested?
  - id: ready-to-merge
    name: Ready to Merge
    depends_on:
      - implementation
    verify:
      - name: "Branch pushed to remote"
        type: command
        run: "git push origin {{branch}} && git ls-remote --heads origin {{branch}} | grep -q ."
      - name: "Master merged into branch"
        type: command
        run: "git fetch origin {{master}} && git merge-base --is-ancestor origin/{{master}} {{branch}}"
      - name: "PR raised"
        type: command
        run: "gh pr list --head {{branch}} --base {{master}} --state open --json url -q \".[0].url\" | grep -q ."
