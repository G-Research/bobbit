id: bug-fix
name: Bug Fix
description: Fix a reported bug with TDD verification

gates:
  - id: issue-analysis
    name: Issue Analysis
    content: true
    inject_downstream: true
    verify:
      - name: "Analysis quality"
        type: llm-review
        prompt: |
          Review the issue analysis for completeness. Check:
          1. Reproduction steps are specific enough to follow mechanically
          2. Root cause references actual source files and lines
          3. Analysis distinguishes symptoms from underlying cause
          4. **Test plan** — the analysis must describe what test will verify the fix.
             A unit test or file:// fixture test is sufficient for most bug fixes.
             E2E tests are only needed if the bug involves a multi-step user journey
             that cannot be reproduced without a running server (e.g. WebSocket
             interactions, cross-page navigation, session persistence across reload).

      - name: "Gap analysis"
        type: llm-review
        role: spec-auditor
        prompt: |
          Compare the goal specification to this issue analysis.

          The goal spec is:
          {{goal_spec}}

          Identify:
          1. Bug symptoms mentioned in the goal but not analyzed
          2. Missing reproduction steps for reported behavior
          3. Root cause analysis gaps relative to the reported issue

  - id: reproducing-test
    name: Reproducing Test
    depends_on: [issue-analysis]
    metadata:
      test_command: string
      error_pattern: string
    verify:
      - name: "Test fails (bug exists)"
        type: command
        run: "{{agent.test_command}}"
        expect: failure

  - id: implementation
    name: Implementation
    depends_on: [reproducing-test]
    verify:
      - name: "Type check"
        type: command
        run: "{{project.typecheck_command}}"
      - name: "Repro test passes (bug fixed)"
        type: command
        run: "{{reproducing-test.meta.test_command}}"
        expect: success
      - name: "Unit tests"
        type: command
        run: "{{project.test_unit_command}}"
      - name: "E2E tests"
        type: command
        run: "{{project.test_e2e_command}}"
      - name: "Gap analysis"
        type: llm-review
        role: spec-auditor
        phase: 1
        prompt: |
          Compare the goal specification and design document to the actual implementation on this branch.

          The goal spec is:
          {{goal_spec}}

          Run `git diff {{master}}...{{branch}} -- . ':!package-lock.json'` to see the implementation diff.

          Identify:
          1. Features described in the goal but not implemented
          2. Acceptance criteria not met by the code changes
          3. Does the fix address the root cause identified in the issue analysis?

      - name: "Code quality review"
        type: llm-review
        role: code-reviewer
        phase: 1
        prompt: |
          Review the code changes on branch {{branch}} vs {{master}} for quality.

          Run `git diff {{master}}...{{branch}} -- . ':!package-lock.json'` to see changes.
          Read modified files for full context.

          Check:
          1. Correctness — does the fix address the root cause?
          2. Minimality — no unrelated changes
          3. Error handling — missing try/catch, unhandled promise rejections
          4. Regression risk — could this break other things?
          5. Test coverage — is the fix adequately tested?

      - name: "Regression test coverage"
        type: llm-review
        phase: 1
        prompt: |
          Verify that the bug fix includes a regression test that would catch reintroduction.

          The goal spec is:
          {{goal_spec}}

          Run `git diff {{master}}...{{branch}} -- . ':!package-lock.json'` to see all changes.

          Look for new or modified test files in:
          - `tests/*.test.ts` or `tests/*.spec.ts` — unit tests and file:// fixture tests
          - `tests/e2e/*.spec.ts` or `tests/e2e/ui/*.spec.ts` — E2E tests

          Any test type is acceptable. A unit test or Playwright file:// fixture that
          reproduces the bug scenario is ideal — these run in <1s and don't need a server.
          Full E2E tests are only warranted when the bug involves multi-step server
          interactions (WebSocket flows, cross-page navigation, session persistence).

          **Verdict:**
          - FAIL if no regression test was added at all
          - PASS if at least one test (unit, fixture, or E2E) covers the fixed behavior

      - name: "Security review"
        type: llm-review
        role: security-reviewer
        phase: 1
        prompt: |
          Security review of changes on branch {{branch}} vs {{master}}.

          Run `git diff {{master}}...{{branch}} -- . ':!package-lock.json'` to see changes.

          Check:
          1. Injection risks — command injection, path traversal, template injection
          2. Auth/authz — are new endpoints properly authenticated?
          3. Data validation — are inputs validated and sanitized?
          4. Secrets handling — no hardcoded secrets, tokens, or credentials
          5. Dependency risks — any new dependencies with known vulnerabilities?

      - name: "QA testing"
        type: agent-qa
        role: qa-tester
        phase: 2
        optional: true
        label: "Enable QA Testing"
        description: "Spawn a QA agent that builds the project, starts an ephemeral server, and drives a real browser through user scenarios to validate the fix works end-to-end."
        prompt: |
          You are performing QA testing for this goal. Stand up an ephemeral test
          environment and drive browser-based testing scenarios.

          Goal specification:
          {{goal_spec}}

          ## Step 0: Plan your scenarios FIRST

          Before touching the browser or starting any server, read the goal spec and
          upstream design doc above. Produce a numbered checklist of 3-5 scenarios
          to test, in priority order. Output this checklist as your first message.

          Rules for scenario selection:
          - Only include things verifiable through a browser (clicks, navigation, visual states)
          - Exclude API-only behavior, code quality, performance (covered by automated tests)
          - Each scenario is one specific sentence — what to do and what to check
          - Core happy path first, edge cases last
          - Cap at 5 scenarios — you do not have time for more

          Example:
          1. Reproduce the bug — navigate to [page], perform [action], verify the bug is visible
          2. Verify the fix — same steps, confirm the correct behavior
          3. Check related flows — verify the fix didn't break adjacent functionality

          Then work through the list in order. Do not add scenarios mid-test.

          ## How to test

          The ephemeral server is a fully functional Bobbit instance. Use it like a
          human would — create sessions, create goals, select workflows, interact with
          the UI to put it in the state you need. If you need a goal dashboard with
          verification history, create a goal and signal its gates. If you need a session
          with tool calls, create a session and send messages. Build up the state you
          need through normal UI interactions.

          ## Critical Rules

          1. **Capture screenshots inline** — call `browser_screenshot()` without `savePath`.
             The tool response includes base64 image data directly. Use this data to embed
             screenshots in your HTML report as `data:image/png;base64,<data>` URIs.
             No need to save to disk or read back.

          2. **Verify your port is unique** — check `cat .bobbit/state/gateway-url` to see
             the dev server port. Your ephemeral server MUST use a different port. If port
             allocation gives you the same port, allocate again.

          3. **Verify URL after each navigation** — run `browser_eval(expression="window.location.href")`
             after navigating and after significant interactions to confirm you're still on
             your ephemeral server. If the port is wrong, re-navigate.

          4. **Spend no more than 10 tool calls per scenario.** If you hit a roadblock,
             mark it SKIPPED, move on to the next scenario, and come back if time permits.

          5. **Do NOT read source code** — do not grep or cat .ts/.js files, minified
             bundles, or built assets. Test from the user's perspective only.

          6. **Do NOT write HTML files or test fixtures** — do not create workaround HTML
             pages, inject WebSocket messages, or build synthetic test harnesses. If a
             feature isn't visible in the UI, report that as a finding — don't try to
             engineer around it.

          Focus on testing the user-facing changes described in the goal spec.
          If the project does not have qa_start_command configured, call
          `verification_result(verdict="pass", summary="QA testing is not configured for this project.")`.

          After completing all scenarios, call `verification_result` to submit your results:
          - `verdict`: "pass" or "fail" based on test results
          - `summary`: concise summary of findings
          - `report_html`: self-contained HTML report with embedded base64 screenshots

          This tool call is REQUIRED. Do not emit <verdict> or <qa_report> XML tags.

  - id: documentation
    name: Documentation
    depends_on: [implementation]
    verify:
      - name: "Documentation coverage"
        type: llm-review
        prompt: |
          Review documentation for the changes on branch {{branch}} vs {{master}}.

          Run `git diff {{master}}...{{branch}} -- . ':!package-lock.json'` to see all changes.
          Read the key documentation files: AGENTS.md, README.md, and files in docs/.

          The goal spec is:
          {{goal_spec}}

          **Check 1 — Every feature is documented:**
          - Every new user-facing feature, API endpoint, config option, or behavioral change
            introduced in this branch must be documented somewhere.
          - If a feature is only described in code comments, that is NOT sufficient — it must
            appear in a .md file (AGENTS.md, README.md, or a file in docs/).
          - List any undocumented features.

          **Check 2 — Existing documentation is updated:**
          - If the changes modify behavior that is already documented, the documentation must
            be updated to reflect the new behavior.
          - Check for stale references: old API signatures, removed config options, renamed
            files, changed defaults, altered workflows.
          - List any stale documentation that was not updated.

          **Check 3 — Documentation quality standards:**
          Evaluate all new or modified documentation against these standards:

          a) **Hierarchy of detail** — Top-level files (AGENTS.md, README.md) should give
             concise summaries and link to specific docs/*.md files for detail. Detailed
             explanations belong in docs/, not crammed into AGENTS.md. Check that new docs
             follow this layered pattern and add cross-references where appropriate.

          b) **Resilience to future changes** — Documentation must NOT be fragile. Flag:
             - Hardcoded line numbers (e.g. "see line 42 of server.ts")
             - Hardcoded counts that will drift (e.g. "the 15 tool groups")
             - Exact file paths to files that are likely to move (prefer describing
               the module/concept and its location pattern instead)
             - Version-specific claims without noting the version

          c) **Explains the WHY, not just the what/how** — Documentation should explain
             the reasoning behind design decisions, not just describe the mechanics.
             "Sessions persist to disk" is what. "Sessions persist to disk so they survive
             server restarts and the user doesn't lose context" is why. Flag sections
             that describe mechanics without motivation.

          d) **Big-picture context** — New documentation should orient the reader by
             connecting the feature to the broader system. Before diving into details,
             briefly explain where this fits in the architecture, what problem it solves,
             and how it relates to adjacent features. Flag documentation that jumps
             straight into implementation details without context.

          Summarize your findings with:
          - PASS/FAIL for each of the 3 checks
          - Specific items that need to be addressed (with file paths and descriptions)

  - id: ready-to-merge
    name: Ready to Merge
    depends_on: [documentation]
    verify:
      - name: "Branch pushed to remote"
        type: command
        run: "git push origin {{branch}} && git ls-remote --heads origin {{branch}} | grep -q ."
      - name: "Master merged into branch"
        type: command
        run: "git fetch origin {{master}} && git merge-base --is-ancestor origin/{{master}} {{branch}}"
      - name: "PR raised"
        type: command
        run: "gh pr list --head {{branch}} --base {{master}} --state open --json url -q \".[0].url\" | grep -q ."
