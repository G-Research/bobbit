name: bash_bg
description: "Manage background shell processes. Actions: create, logs, grep, head, slice, kill, list."
summary: "Start, monitor, and kill long-running background shell processes."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Shell
renderer: src/ui/tools/renderers/BgProcessRenderer.ts
docs: |-
  Actions: create (start a process), logs (tail output), grep (search logs), head (first N lines), slice (line range), kill (terminate), list (show all). Use for dev servers, file watchers, long-running builds. Parameters: `command` (for create), `name` (required for create ŌĆö a short max-3-word label like "dev server" or "test runner"), `id` (for logs/grep/head/slice/kill), `tail` (log lines, default 200), `pattern` (for grep ŌĆö string or regex), `context` (grep context lines, default 0), `max_results` (grep max matches, default 50), `lines` (for head, default 50), `from`/`to` (1-indexed line range for slice).
detail_docs: |
  Manage background shell processes that don't block the agent.

  Actions:
  - `create`: Start a background process. Returns a handle ID.
  - `logs`: View stdout/stderr output from a background process.
  - `kill`: Terminate a background process.
  - `list`: Show all background processes for this session.

  Parameters:
  - `action` (required): One of "create", "logs", "grep", "head", "slice", "kill", "list"
  - `command` (for create): Shell command to run in the background
  - `name` (required for create): Short descriptive name, max 3 words (e.g. "dev server", "test runner", "color echo loop")
  - `id` (for logs/grep/head/slice/kill): Background process ID (e.g. "bg-1")
  - `tail` (for logs): Number of log lines to return from end (default: 200)
  - `pattern` (for grep): Search pattern ŌĆö string or regex, case-insensitive
  - `context` (for grep): Lines of context around each match (default: 0)
  - `max_results` (for grep): Max matches to return (default: 50)
  - `lines` (for head): Number of lines from start (default: 50)
  - `from` / `to` (for slice): 1-indexed line range to retrieve

  Use for dev servers, file watchers, long builds, or any process that
  should run while the agent continues working.

  **Polling discipline**: When waiting for a background process to finish
  (e.g. a Docker build or long test run), do NOT spin-poll `logs` repeatedly.
  Each poll consumes tokens and produces no new information if the output
  hasn't changed. Instead, use `bash` with `sleep <N>` before checking logs,
  or combine: `sleep 60 && echo "checking"` then check logs once. Pick a
  sleep duration proportional to the expected wait (30-120s for builds,
  5-10s for quick tasks). Never poll more than once per 30 seconds for
  long-running processes.
