name: bash_bg
description: "Manage background shell processes. Actions: create (start a process), logs (view output), kill (terminate), list (show all)."
summary: "Start, monitor, and kill long-running background shell processes."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Shell
renderer: src/ui/tools/renderers/BgProcessRenderer.ts
docs: |-
  Actions: create (start a process), logs (view output), kill (terminate), list (show all). Use for dev servers, file watchers, long-running builds. Parameters: `command` (for create), `name` (required for create — a short max-3-word label like "dev server" or "test runner"), `id` (for logs/kill), `tail` (log lines, default 200).
detail_docs: |
  Manage background shell processes that don't block the agent.

  Actions:
  - `create`: Start a background process. Returns a handle ID.
  - `logs`: View stdout/stderr output from a background process.
  - `kill`: Terminate a background process.
  - `list`: Show all background processes for this session.

  Parameters:
  - `action` (required): One of "create", "logs", "kill", "list"
  - `command` (for create): Shell command to run in the background
  - `name` (required for create): Short descriptive name, max 3 words (e.g. "dev server", "test runner", "color echo loop")
  - `id` (for logs/kill): Background process ID (e.g. "bg-1")
  - `tail` (for logs): Number of log lines to return (default: 200)

  Use for dev servers, file watchers, long builds, or any process that
  should run while the agent continues working.

  **Polling discipline**: When waiting for a background process to finish
  (e.g. a Docker build or long test run), do NOT spin-poll `logs` repeatedly.
  Each poll consumes tokens and produces no new information if the output
  hasn't changed. Instead, use `bash` with `sleep <N>` before checking logs,
  or combine: `sleep 60 && echo "checking"` then check logs once. Pick a
  sleep duration proportional to the expected wait (30-120s for builds,
  5-10s for quick tasks). Never poll more than once per 30 seconds for
  long-running processes.
