name: propose_project
description: "Submit a project proposal for user review"
summary: "Propose a project with name, root_path, and optional command fields."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Proposals
docs: >-
  Call this tool when you have detected or configured a project.
  The proposal will be displayed to the user for review and acceptance.
  Parameters: name (required), root_path (required), build_command, test_command,
  typecheck_command, test_unit_command, test_e2e_command, worktree_setup_command.
