name: propose_goal
description: "Submit a goal proposal for user review"
summary: "Propose a goal with title, spec, workflow, and optional fields."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Proposals
docs: >-
  Call this tool when you have gathered enough information to propose a goal.
  The proposal will be displayed to the user for review and acceptance.
  Parameters: title (required), spec (required), cwd, workflow, options.
