  feature:
    id: feature
    name: Feature
    description: Implement a new feature with design, implementation, and review
    gates:
      - id: design-doc
        name: Design Document
        content: true
        inject_downstream: true
        verify:
          - name: Design review
            type: llm-review
            role: architect
            prompt: Review this design document for structure, clarity, and completeness.
              Verify architecture/API surface, file-change rationale, testable
              acceptance criteria, and edge/error handling.
          - name: Gap analysis
            type: llm-review
            role: spec-auditor
            prompt: >-
              Compare the goal specification to this design document.


              The goal spec is:


              {{goal_spec}}


              Identify unaddressed requirements, uncovered acceptance criteria,
              missing edge cases, and contradictions. Use your tools to read the
              design document content from the signal.
      - id: implementation
        name: Implementation
        depends_on:
          - design-doc
        verify:
          - name: Build
            type: command
            timeout: 600
            component: bobbit
            command: build
          - name: Type check passes
            type: command
            phase: 1
            component: bobbit
            command: check
          - name: Unit tests
            type: command
            phase: 1
            component: bobbit
            command: unit
          - name: E2E tests
            type: command
            phase: 2
            timeout: 900
            component: bobbit
            command: e2e
          - name: Gap analysis
            type: llm-review
            role: spec-auditor
            phase: 3
            prompt: >-
              Compare the goal specification and design document to the actual
              implementation on this branch. Ignore documentation gaps; focus
              exclusively on code/behavior gaps relative to the spec and design.


              The goal spec is:


              {{goal_spec}}
          - name: Code quality review
            type: llm-review
            role: code-reviewer
            phase: 3
            prompt: Review the code changes on branch {{branch}} vs origin/{{baseBranch}}
              for quality. Check correctness, error handling, edge cases, code
              style, and test coverage.
          - name: Bug hunt
            type: llm-review
            role: bug-hunter
            phase: 3
            prompt: Review the implementation on branch {{branch}} vs origin/{{baseBranch}}
              for actionable bugs. Focus on correctness, edge cases, error
              paths, cross-system interactions, concurrency/lifecycle, and
              dangerous behavior. Fail only for critical/high actionable bugs;
              include file:line, reproduction conditions, consequence, and why
              it is a bug.
          - name: Security review
            type: llm-review
            role: security-reviewer
            phase: 3
            prompt: Security review of changes on branch {{branch}} vs
              origin/{{baseBranch}}. Check injection, auth/authz, validation,
              secrets, and dependency risks.
          - name: QA testing
            type: agent-qa
            role: qa-tester
            phase: 4
            optional: true
            optionalLabel: Enable QA Testing
            description: Spawn a QA agent that builds the project, starts an ephemeral
              server, and drives a real browser through user scenarios to
              validate the feature works end-to-end.
            prompt: Perform QA testing for this goal. Stand up an ephemeral test environment
              and drive browser-based testing scenarios from the user's
              perspective. Plan 3-5 browser-verifiable scenarios first; then
              execute them and submit verification_result with pass/fail,
              concise summary, and self-contained HTML report with screenshots.
      - id: documentation
        name: Documentation
        depends_on:
          - implementation
        verify:
          - name: Documentation coverage
            type: llm-review
            prompt: Review documentation for the changes on branch {{branch}} vs
              origin/{{baseBranch}}. Verify user-facing
              features/API/config/behavior changes are documented, existing docs
              are updated, placement is appropriate, and documentation quality
              standards are met.
      - id: ready-to-merge
        name: Ready to Merge
        depends_on:
          - documentation
        verify:
          - name: Branch pushed to remote
            type: command
            run: git push origin {{branch}}:refs/heads/{{branch}} && git ls-remote --heads
              origin {{branch}} | grep -q .
          - name: Master merged into branch
            type: command
            run: git fetch origin {{baseBranch}} && git merge-base --is-ancestor
              origin/{{baseBranch}} {{branch}}
          - name: PR raised
            type: command
            run: gh pr list --head {{branch}} --base {{baseBranch}} --state open --json url
              -q ".[0].url" | grep -q .
  bug-fix:
    id: bug-fix
    name: Bug Fix
    description: Fix a reported bug with TDD verification
    gates:
      - id: issue-analysis
        name: Issue Analysis
        content: true
        inject_downstream: true
        verify:
          - name: Analysis quality
            type: llm-review
            prompt: Review the issue analysis for completeness. Check reproduction steps,
              root cause, symptom/cause distinction, and test plan.
          - name: Gap analysis
            type: llm-review
            role: spec-auditor
            prompt: >-
              Compare the goal specification to this issue analysis.


              The goal spec is:

              {{goal_spec}}


              Identify bug symptoms not analyzed, missing reproduction steps,
              and root cause gaps.
      - id: reproducing-test
        name: Reproducing Test
        depends_on:
          - issue-analysis
        metadata:
          test_command: string
          error_pattern: string
        verify:
          - name: Test fails (bug exists)
            type: command
            run: "{{agent.test_command}}"
            expect: failure
      - id: implementation
        name: Implementation
        depends_on:
          - reproducing-test
        verify:
          - name: Build
            type: command
            timeout: 600
            component: bobbit
            command: build
          - name: Type check
            type: command
            phase: 1
            component: bobbit
            command: check
          - name: Repro test passes (bug fixed)
            type: command
            phase: 1
            run: "{{reproducing-test.meta.test_command}}"
            expect: success
          - name: Unit tests
            type: command
            phase: 1
            component: bobbit
            command: unit
          - name: E2E tests
            type: command
            phase: 2
            timeout: 900
            component: bobbit
            command: e2e
          - name: Gap analysis
            type: llm-review
            role: spec-auditor
            phase: 3
            prompt: >-
              Compare the goal specification and design document to the actual
              implementation on this branch. Ignore documentation gaps; focus
              exclusively on code/behavior gaps relative to the spec and design.


              The goal spec is:

              {{goal_spec}}
          - name: Code quality review
            type: llm-review
            role: code-reviewer
            phase: 3
            prompt: Review the code changes on branch {{branch}} vs {{baseBranch}} for
              quality. Check root-cause fix, minimality, error handling,
              regression risk, and test coverage.
          - name: Regression test coverage
            type: llm-review
            phase: 3
            prompt: Verify that the bug fix includes a regression test that would catch
              reintroduction. PASS if at least one unit, fixture, or E2E test
              covers the fixed behavior; FAIL if no regression test was added.
          - name: Bug hunt
            type: llm-review
            role: bug-hunter
            phase: 3
            prompt: Review the implementation on branch {{branch}} vs {{baseBranch}} for
              actionable bugs. Focus on correctness, edge cases, error paths,
              cross-system interactions, concurrency/lifecycle, and dangerous
              behavior. Fail only for critical/high actionable bugs; include
              file:line, reproduction conditions, consequence, and why it is a
              bug.
          - name: Security review
            type: llm-review
            role: security-reviewer
            phase: 3
            prompt: Security review of changes on branch {{branch}} vs {{baseBranch}}. Check
              injection, auth/authz, validation, secrets, and dependency risks.
          - name: QA testing
            type: agent-qa
            role: qa-tester
            phase: 4
            optional: true
            optionalLabel: Enable QA Testing
            description: Spawn a QA agent that builds the project, starts an ephemeral
              server, and drives a real browser through user scenarios to
              validate the fix works end-to-end.
            prompt: Perform QA testing for this goal. Stand up an ephemeral test environment
              and drive browser-based testing scenarios. Plan 3-5
              browser-verifiable scenarios first, including reproducing the bug
              and verifying the fix; then submit verification_result with
              pass/fail, concise summary, and self-contained HTML report with
              screenshots.
      - id: documentation
        name: Documentation
        depends_on:
          - implementation
        verify:
          - name: Documentation coverage
            type: llm-review
            prompt: Review documentation for the changes on branch {{branch}} vs
              {{baseBranch}}. Verify user-facing features/API/config/behavior
              changes are documented, existing docs are updated, placement is
              appropriate, and documentation quality standards are met.
      - id: ready-to-merge
        name: Ready to Merge
        depends_on:
          - documentation
        verify:
          - name: Branch pushed to remote
            type: command
            run: git push origin {{branch}}:refs/heads/{{branch}} && git ls-remote --heads
              origin {{branch}} | grep -q .
          - name: Master merged into branch
            type: command
            run: git fetch origin {{baseBranch}} && git merge-base --is-ancestor
              origin/{{baseBranch}} {{branch}}
          - name: PR raised
            type: command
            run: gh pr list --head {{branch}} --base {{baseBranch}} --state open --json url
              -q ".[0].url" | grep -q .
