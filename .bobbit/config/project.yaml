  human-signoff-test:
    id: human-signoff-test
    name: Human Sign-off Test
    description: Minimal workflow for exercising the human sign-off gate end-to-end.
    gates:
      - id: design-doc
        name: Design Doc
        verify:
          - name: Content present
            type: command
            run: sleep 60 && echo ok
            phase: 0
      - id: human-approval
        name: Human Approval
        content: true
        depends_on:
          - design-doc
        verify:
          - name: design-approval
            type: human-signoff
            phase: 0
            label: Approve to proceed
            prompt: |-
              The mock document for {{branch}} is ready for human review.

              Review it and approve or reject before implementation begins.
              Reject with feedback if anything needs to change.
      - id: implementation
        name: Implementation
        depends_on:
          - human-approval
        verify:
          - name: Quick check
            type: command
            run: sleep 60 && echo ok
            phase: 0
          - name: Bug hunt
            type: llm-review
            role: bug-hunter
            phase: 1
            prompt: Review the implementation on branch {{branch}} vs {{baseBranch}} for
              actionable bugs. Focus on correctness, edge cases, error paths,
              cross-system interactions, concurrency/lifecycle, and dangerous
              behavior. Fail only for critical/high actionable bugs; include
              file:line, reproduction conditions, consequence, and why it is a
              bug.
      - id: ready-to-merge
        name: Ready to Merge
        depends_on:
          - implementation
        verify:
          - name: All gates passed
            type: command
            run: sleep 60 && echo ok
            phase: 0
