sandbox: docker
sandbox_image: bobbit-agent
base_ref: origin/master
components:
  - name: bobbit
    repo: .
    worktree_setup_command: npm ci --prefer-offline --no-audit --no-fund
    commands:
      build: npm run build
      check: npm run check
      unit: npm run test:unit
      e2e: npm run test:e2e
    config:
      qa_start_command: BOBBIT_NO_OPEN='1' BOBBIT_LLM_REVIEW_SKIP='1'
        BOBBIT_SKIP_NPM_CI='1' PORT=$PORT WORK_DIR=$WORK_DIR
        BOBBIT_DIR=$WORK_DIR/.bobbit BOBBIT_NO_OPEN=1 BOBBIT_LLM_REVIEW_SKIP=1
        BOBBIT_SKIP_NPM_CI=1 node dist/server/cli.js --host 127.0.0.1 --port
        $PORT --no-tls --auth --cwd $WORK_DIR
      qa_build_command: npm run build
      qa_health_check: http://127.0.0.1:$PORT/api/health
      qa_browser_entry: http://127.0.0.1:$PORT/?token=$TOKEN
      qa_max_duration_minutes: "10"
      qa_max_scenarios: "5"
workflows:
  general:
    id: general
    name: General
    description: Lightweight workflow for general-purpose goals
    gates:
      - id: design-doc
        name: Design Document
        content: true
        inject_downstream: true
        verify:
          - name: Design review
            type: llm-review
            role: architect
            prompt: >-
              Review this design document for structure, clarity, and
              completeness. Verify:


              1. Approach is clearly described with rationale


              2. File changes are listed with specific descriptions


              3. Acceptance criteria are specific and testable


              4. Edge cases and error handling are considered


              5. **E2E test plan** — the design MUST include a section
              describing the browser-based E2E tests that will validate the user
              journey end-to-end. For UI features, this means fullstack tests
              (in tests/e2e/ui/) that exercise the complete workflow through
              real browser interactions: navigate to the feature, interact with
              it, verify state persists across reload, verify cleanup/removal
              works. For API-only features, E2E tests (in tests/e2e/) covering
              the request/response lifecycle are sufficient. If no E2E test plan
              section is present, FAIL this review.
          - name: Gap analysis
            type: llm-review
            role: spec-auditor
            prompt: >-
              Compare the goal specification to this design document.


              The goal spec is:


              {{goal_spec}}


              Identify:


              1. Requirements in the goal spec not addressed in the design


              2. Acceptance criteria not covered by the proposed changes


              3. Edge cases mentioned in the goal but missing from the design


              4. Any contradictions between the goal and the design


              Use your tools to read the design document content from the
              signal.
      - id: implementation
        name: Implementation
        depends_on:
          - design-doc
        verify:
          - name: Build
            type: command
            timeout: 600
            component: bobbit
            command: build
          - name: Type check passes
            type: command
            phase: 1
            component: bobbit
            command: check
          - name: Unit tests
            type: command
            phase: 1
            component: bobbit
            command: unit
          - name: E2E tests
            type: command
            phase: 2
            timeout: 900
            component: bobbit
            command: e2e
          - name: Gap analysis
            type: llm-review
            role: spec-auditor
            phase: 3
            prompt: >-
              Compare the goal specification and design document to the actual
              implementation on this branch.


              The goal spec is:


              {{goal_spec}}


              Run `git diff origin/{{baseBranch}}...{{branch}} -- .
              ':!package-lock.json'` to see the implementation diff.


              Read the design document content from upstream gates.


              Identify:


              1. Features described in the goal/design but not implemented


              2. Acceptance criteria not met by the code changes


              3. Implemented behavior that contradicts the specification


              IMPORTANT: Ignore documentation gaps. This gap analysis runs
              during the implementation phase, BEFORE the documentation gate. Do
              NOT flag missing or outdated documentation, README updates,
              design-doc updates, code comments, or other docs-only artifacts as
              gaps — those are addressed by the dedicated documentation gate
              later in the workflow. Focus exclusively on code/behavior gaps
              relative to the spec and design.
          - name: Code quality review
            type: llm-review
            role: code-reviewer
            phase: 3
            prompt: >-
              Review the code changes on branch {{branch}} vs
              origin/{{baseBranch}} for quality.


              Start with `git diff --stat origin/{{baseBranch}}...{{branch}} --
              . ':!package-lock.json'` to see which files changed.


              Then use `git diff origin/{{baseBranch}}...{{branch}} -M -- .
              ':!package-lock.json'` (with rename detection) to see actual
              content changes — this collapses pure renames into one-line
              summaries.


              For large diffs, review files individually with `read` rather than
              dumping the entire diff into context.


              Check:


              1. Correctness — logic errors, off-by-one, race conditions


              2. Error handling — missing try/catch, unhandled promise
              rejections


              3. Edge cases — null/undefined, empty arrays, boundary values


              4. Code style — consistent naming, no dead code, clear intent


              5. Test coverage — are new behaviors tested?
          - name: E2E user journey coverage
            type: llm-review
            phase: 3
            prompt: >-
              Verify that the implementation includes browser-based E2E tests
              covering the user journey for this feature.


              The goal spec is:


              {{goal_spec}}


              Run `git diff origin/{{baseBranch}}...{{branch}} -- .
              ':!package-lock.json'` to see all changes.


              Check navigation, happy path, persistence, cleanup, and
              integration coverage in tests/e2e/ui/*.spec.ts or
              tests/e2e/*.spec.ts. FAIL if no new E2E tests were added for
              user-facing behavior, or if persistence/cleanup are skipped.
          - name: Bug hunt
            type: llm-review
            role: bug-hunter
            phase: 3
            prompt: Review the implementation on branch {{branch}} vs origin/{{baseBranch}}
              for actionable bugs. Focus on correctness, edge cases, error
              paths, cross-system interactions, concurrency/lifecycle, and
              dangerous behavior. Fail only for critical/high actionable bugs;
              include file:line, reproduction conditions, consequence, and why
              it is a bug.
          - name: Security review
            type: llm-review
            role: security-reviewer
            phase: 3
            prompt: >-
              Security review of changes on branch {{branch}} vs
              origin/{{baseBranch}}.


              Run `git diff origin/{{baseBranch}}...{{branch}} -- .
              ':!package-lock.json'` to see changes.


              Check injection risks, auth/authz, data validation, secrets
              handling, and dependency risks.
      - id: documentation
        name: Documentation
        depends_on:
          - implementation
        verify:
          - name: Documentation coverage
            type: llm-review
            prompt: >-
              Review documentation for the changes on branch {{branch}} vs
              origin/{{baseBranch}}.


              Run `git diff origin/{{baseBranch}}...{{branch}} -- .
              ':!package-lock.json'` to see all changes.


              Read AGENTS.md, README.md, and docs/. Verify every user-facing
              feature, API endpoint, config option, or behavior change is
              documented; stale docs are updated; documentation placement is
              appropriate; and new docs have good hierarchy, resilience, WHY,
              and big-picture context.
      - id: ready-to-merge
        name: Ready to Merge
        depends_on:
          - documentation
        verify:
          - name: Branch pushed to remote
            type: command
            run: git push origin {{branch}}:refs/heads/{{branch}} && git ls-remote --heads
              origin {{branch}} | grep -q .
          - name: Master merged into branch
            type: command
            run: git fetch origin {{baseBranch}} && git merge-base --is-ancestor
              origin/{{baseBranch}} {{branch}}
          - name: PR raised
            type: command
            run: gh pr list --head {{branch}} --base {{baseBranch}} --state open --json url
              -q ".[0].url" | grep -q .
  pr-review:
    id: pr-review
    name: PR Review
    description: Multi-dimensional review of a GitHub PR. Agent extracts the PR
      number from the goal spec, fetches it locally, runs five independent
      review gates, then posts an aggregated review comment back to GitHub.
    gates:
      - id: fetch-pr
        name: Fetch PR
        content: true
        inject_downstream: true
        metadata:
          pr_number: GitHub PR number (integer, e.g. 1234)
          pr_url: Full PR URL for reference
          head_sha: Head commit SHA captured at fetch time
        verify:
          - name: PR checked out locally
            type: command
            run: gh pr checkout {{fetch-pr.meta.pr_number}} && git rev-parse HEAD
          - name: PR metadata accessible
            type: command
            run: gh pr view {{fetch-pr.meta.pr_number}} --json
              number,title,headRefName,baseRefName,url | grep -q '"number"'
      - id: code-quality
        name: Code Quality Review
        content: true
        inject_downstream: true
        depends_on:
          - fetch-pr
        verify:
          - name: Code quality review report quality
            type: llm-review
            role: code-reviewer
            prompt: "Verify the quality of the signaled code-quality review report for PR
              #{{fetch-pr.meta.pr_number}}. PASS if it is concrete, actionable,
              includes file:line/severity for findings or a reasoned no-issues
              result, and covers correctness, error handling, edge cases, style,
              and maintainability. Do not fail because the PR itself has bugs."
      - id: security
        name: Security Review
        content: true
        inject_downstream: true
        depends_on:
          - fetch-pr
        verify:
          - name: Security review report quality
            type: llm-review
            role: security-reviewer
            prompt: "Verify the quality of the signaled security review report for PR
              #{{fetch-pr.meta.pr_number}}. PASS if it names considered risk
              classes and gives actionable findings with
              severity/file:line/remediation or a reasoned no-issues result. Do
              not fail because the PR itself has security issues."
      - id: test-coverage
        name: Test Coverage
        content: true
        inject_downstream: true
        depends_on:
          - fetch-pr
        verify:
          - name: Test coverage review report quality
            type: llm-review
            prompt: "Verify the quality of the signaled test-coverage review report for PR
              #{{fetch-pr.meta.pr_number}}. PASS if it maps behavior changes to
              corresponding tests or explicit gaps across relevant test layers.
              Do not fail because the PR has missing tests."
      - id: documentation
        name: Documentation
        content: true
        inject_downstream: true
        depends_on:
          - fetch-pr
        verify:
          - name: Documentation review report quality
            type: llm-review
            prompt: "Verify the quality of the signaled documentation review report for PR
              #{{fetch-pr.meta.pr_number}}. PASS if it identifies undocumented
              features/stale references or notes none, comments on documentation
              quality, and gives actionable remediation. Do not fail because the
              PR has documentation gaps."
      - id: spec-conformance
        name: Spec Conformance
        content: true
        inject_downstream: true
        depends_on:
          - fetch-pr
        verify:
          - name: Spec conformance review report quality
            type: llm-review
            role: spec-auditor
            prompt: "Verify the quality of the signaled spec-conformance review report for
              PR #{{fetch-pr.meta.pr_number}}. PASS if it references the
              source-of-truth spec and lists conformance findings with spec
              quotes, file:line, and severity, or explains why the PR conforms.
              Do not fail because the PR diverges from spec."
      - id: post-review
        name: Post Review to GitHub
        content: true
        depends_on:
          - code-quality
          - security
          - test-coverage
          - documentation
          - spec-conformance
        metadata:
          verdict: "Overall verdict: approve | request-changes | comment"
          review_body_file: Path to a markdown file containing the aggregated review body to post
        verify:
          - name: Aggregated review body exists
            type: command
            run: test -s "{{post-review.meta.review_body_file}}"
          - name: Verdict is valid
            type: command
            run: echo {{post-review.meta.verdict}} | grep -Eq
              '^(approve|request-changes|comment)$'
          - name: Submit review to GitHub
            type: command
            run: gh pr review {{fetch-pr.meta.pr_number}} --{{post-review.meta.verdict}}
              --body-file "{{post-review.meta.review_body_file}}"
          - name: Confirm review posted
            type: command
            run: gh pr view {{fetch-pr.meta.pr_number}} --json reviews -q
              '.reviews[-1].state' | grep -Eq
              '(APPROVED|CHANGES_REQUESTED|COMMENTED)'
