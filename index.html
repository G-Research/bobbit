<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />

		<meta name="theme-color" content="#2b2d2b" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="apple-touch-icon" href="/icons/icon-192.png" />
		<title>Bobbit</title>
		<style>
			/* ─────────────────────────────────────────────────────────────────
			 * INLINE BOOT SKELETON
			 * Painted before any JS executes so the very first frame after a
			 * cold launch / iOS PWA snapshot restore shows app structure
			 * (sidebar + chat shape) instead of a white screen. Lit's first
			 * render replaces #app's children. Budget: ~2KB gzipped.
			 * ────────────────────────────────────────────────────────────── */
			.bobbit-skeleton {
				position: fixed;
				inset: 0;
				display: flex;
				background: #f7f7f6;
				color: #2b2d2b;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				z-index: 0;
				transition: opacity 200ms ease-out;
				/*
				 * Never capture clicks. The skeleton is purely visual — a
				 * placeholder while Lit boots. If the real UI mounts on top of
				 * us before the watchdog removes us (multi-context tests, slow
				 * MutationObserver, etc.) every click would otherwise be
				 * intercepted by this fixed-position overlay. The watchdog
				 * still hides us via .--hide once #app[data-rendered=true]
				 * fires, but pointer-events:none is the unconditional safety
				 * net.
				 */
				pointer-events: none;
			}
			.bobbit-skeleton.--hide {
				opacity: 0;
				pointer-events: none;
			}
			@media (prefers-color-scheme: dark) {
				.bobbit-skeleton { background: #1a1c1a; color: #d4d4d2; }
			}
			.bobbit-skeleton__sidebar {
				width: 240px;
				background: rgba(0,0,0,0.04);
				border-right: 1px solid rgba(0,0,0,0.08);
				padding: 12px 8px;
				display: flex;
				flex-direction: column;
				gap: 8px;
			}
			@media (prefers-color-scheme: dark) {
				.bobbit-skeleton__sidebar { background: rgba(255,255,255,0.04); border-right-color: rgba(255,255,255,0.08); }
			}
			@media (max-width: 767px) { .bobbit-skeleton__sidebar { display: none; } }
			.bobbit-skeleton__row {
				height: 14px;
				border-radius: 4px;
				background: rgba(0,0,0,0.07);
			}
			@media (prefers-color-scheme: dark) {
				.bobbit-skeleton__row { background: rgba(255,255,255,0.07); }
			}
			.bobbit-skeleton__row.--w70 { width: 70%; }
			.bobbit-skeleton__row.--w50 { width: 50%; }
			.bobbit-skeleton__row.--w90 { width: 90%; }
			.bobbit-skeleton__main {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-width: 0;
				padding: 16px;
				gap: 12px;
				overflow: hidden;
			}
			.bobbit-skeleton__transcript {
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 12px;
				font-size: 14px;
				line-height: 1.5;
				overflow: hidden;
			}
			.bobbit-skeleton__msg {
				max-width: 720px;
				padding: 8px 12px;
				border-radius: 8px;
				white-space: pre-wrap;
				word-break: break-word;
				background: rgba(0,0,0,0.03);
			}
			@media (prefers-color-scheme: dark) {
				.bobbit-skeleton__msg { background: rgba(255,255,255,0.04); }
			}
			.bobbit-skeleton__msg.--user { background: rgba(64,128,200,0.12); align-self: flex-end; }
			.bobbit-skeleton__pill {
				position: fixed;
				bottom: 12px;
				right: 12px;
				padding: 6px 12px;
				border-radius: 999px;
				background: rgba(0,0,0,0.65);
				color: #fff;
				font-size: 12px;
				z-index: 10;
				opacity: 0.85;
			}
			.bobbit-watchdog {
				position: fixed;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				gap: 12px;
				background: #f7f7f6;
				color: #2b2d2b;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				z-index: 100;
			}
			@media (prefers-color-scheme: dark) {
				.bobbit-watchdog { background: #1a1c1a; color: #d4d4d2; }
			}
			.bobbit-watchdog button {
				padding: 8px 16px;
				border-radius: 6px;
				border: 1px solid currentColor;
				background: transparent;
				color: inherit;
				font-size: 14px;
				cursor: pointer;
			}
		</style>
	</head>
	<body class="bg-background">
		<!--
			The inline boot skeleton + snapshot pre-paint live OUTSIDE #app so
			Lit's first render (which replaces #app's children) doesn't blow them
			away. They're hidden once the live UI is connected (data-rendered
			attribute on #app + WS connection) by the watchdog cleanup script.
		-->
		<div class="bobbit-skeleton" data-bobbit-skeleton="1" aria-hidden="true">
			<aside class="bobbit-skeleton__sidebar">
				<div class="bobbit-skeleton__row --w70"></div>
				<div class="bobbit-skeleton__row --w50"></div>
				<div class="bobbit-skeleton__row --w90"></div>
				<div class="bobbit-skeleton__row --w70"></div>
				<div class="bobbit-skeleton__row --w50"></div>
			</aside>
			<main class="bobbit-skeleton__main">
				<div class="bobbit-skeleton__row --w50"></div>
				<div class="bobbit-skeleton__transcript" data-bobbit-skeleton-transcript="1"></div>
			</main>
		</div>
		<div id="app"></div>
		<noscript>
			<div style="padding:24px;font-family:sans-serif">
				Bobbit needs JavaScript enabled to run.
			</div>
		</noscript>
		<script>
			(function() {
				var p = localStorage.getItem('palette');
				if (p && p !== 'forest') document.documentElement.dataset.palette = p;
				// Inject the PWA manifest link with the auth token baked in so iOS
				// installs a tokenized start_url. Done via JS (rather than a static
				// <link> tag) to guarantee the href includes the token BEFORE Safari
				// fetches the manifest — otherwise there's a race where the browser
				// starts fetching /manifest.json (untokenized) during HTML parsing.
				// The server validates the token before embedding; invalid tokens
				// fall through to a plain manifest with start_url="/".
				try {
					var params = new URLSearchParams(window.location.search);
					var token = params.get('token') || localStorage.getItem('gateway.token');
					var href = (token && token !== 'localhost')
						? '/manifest.json?token=' + encodeURIComponent(token)
						: '/manifest.json';
					var link = document.createElement('link');
					link.rel = 'manifest';
					link.id = 'pwa-manifest';
					link.href = href;
					document.head.appendChild(link);
				} catch (e) { /* ignore */ }
			})();
		</script>
		<script>
			/*
			 * Snapshot pre-paint + watchdog escalation.
			 *
			 * 1. Synchronously rehydrate the most-recent messages from the
			 *    persisted UI snapshot into the inline skeleton, so the first
			 *    paint shows the last view the user saw — even before the
			 *    main JS bundle parses. This is what makes returning to the
			 *    PWA feel instant on iOS PWA snapshot restore.
			 *
			 * 2. After 3s with no Lit render, swap the skeleton for a
			 *    "Reconnecting…" banner with a manual Reload button.
			 *
			 * 3. After 10s with no Lit render, escalate to a "Something went
			 *    wrong" banner. Click → location.reload(). This is the only
			 *    auto-reload-on-click path the spec permits.
			 *
			 * Lit signals "I rendered" by setting data-rendered="true" on
			 * #app (see src/app/main.ts after first renderApp()). Both
			 * watchdog timers check for it before escalating.
			 */
			function __bobbitPrepaint() {
				try {
					var raw = localStorage.getItem("bobbit.ui-snapshot.v1");
					if (!raw) return;
					var snap = JSON.parse(raw);
					// Support two payload shapes: the canonical { activeSession }
					// shape produced by app/ui-snapshot.ts, and the legacy /
					// test-fixture { sessions: { [id]: ... } } shape.
					var sess = snap && snap.activeSession;
					if (!sess && snap && snap.sessions && snap.selectedSessionId) {
						sess = snap.sessions[snap.selectedSessionId];
					}
					var msgs = sess && Array.isArray(sess.messages) ? sess.messages.slice(-6) : [];
					if (!msgs.length) return;
					var host = document.querySelector("[data-bobbit-skeleton-transcript]");
					// Defensive fallback: if the inline skeleton has been removed
					// (e.g. a custom shell strips it), inject a minimal off-screen
					// transcript host into <body> so the seeded text still lands
					// in document.body.textContent. Critical for the cold-offline
					// reproducing test which only checks body.textContent.
					if (!host) {
						host = document.createElement("div");
						host.className = "bobbit-skeleton__transcript";
						host.setAttribute("data-bobbit-skeleton-transcript", "1");
						host.setAttribute("data-bobbit-skeleton-transcript-fallback", "1");
						if (document.body) document.body.appendChild(host);
						else return;
					}
					// Idempotent: clear any prior prepaint output before re-emitting.
					host.textContent = "";
					var frag = document.createDocumentFragment();
					for (var i = 0; i < msgs.length; i++) {
						var m = msgs[i];
						var text = "";
						if (typeof m.content === "string") text = m.content;
						else if (Array.isArray(m.content)) {
							for (var j = 0; j < m.content.length; j++) {
								var b = m.content[j];
								if (b && b.type === "text" && typeof b.text === "string") {
									text += (text ? "\n" : "") + b.text;
								}
							}
						} else if (typeof m.text === "string") {
							text = m.text;
						}
						if (!text) continue;
						var div = document.createElement("div");
						div.className = "bobbit-skeleton__msg" + (m.role === "user" ? " --user" : "");
						// Append a leading newline (rendered as whitespace by the
						// browser via white-space: pre-wrap) so each message's text
						// is word-boundary-separated from its neighbour in
						// `body.textContent`. Critical for tests that match on
						// short tokens like `\bOK\b` against the flat body text.
						div.textContent = (i > 0 ? "\n" : "") + text;
						frag.appendChild(div);
					}
					host.appendChild(frag);
					host.setAttribute("data-prepaint-msgs", String(msgs.length));
					// Reveal the skeleton (it was hidden if we previously connected).
					var sk = document.querySelector("[data-bobbit-skeleton]");
					if (sk) sk.classList.remove("--hide");
					// Reconnecting pill — non-blocking, removed once Lit renders.
					var pill = document.createElement("div");
					pill.className = "bobbit-skeleton__pill";
					pill.setAttribute("data-bobbit-pill", "1");
					pill.textContent = "Reconnecting…";
					document.body.appendChild(pill);
				} catch (e) { /* snapshot prepaint must never crash */ }
			}
			__bobbitPrepaint();
			// Re-run defensively on multiple lifecycle hooks so a same-URL
			// navigation, iOS bfcache restore, or a localStorage write from
			// another tab all repopulate the skeleton.
			document.addEventListener("DOMContentLoaded", function() { __bobbitPrepaint(); });
			window.addEventListener("pageshow", function() { __bobbitPrepaint(); });
			window.addEventListener("storage", function(ev) {
				if (ev.key === "bobbit.ui-snapshot.v1" || ev.key === null) __bobbitPrepaint();
			});
			// Patch same-tab localStorage writes to also notify, since the
			// native `storage` event only fires across tabs/windows. This
			// keeps the skeleton in sync when ui-snapshot.ts writes from the
			// app bootstrap path within the same execution context, and also
			// when E2E fixtures seed localStorage via page.evaluate.
			try {
				var nativeSet = Storage.prototype.setItem;
				Storage.prototype.setItem = function(k, v) {
					var r = nativeSet.apply(this, arguments);
					if (this === window.localStorage && k === "bobbit.ui-snapshot.v1") {
						try { __bobbitPrepaint(); } catch (e) { /* ignore */ }
					}
					return r;
				};
			} catch (e) { /* ignore patch failures */ }
			// Expose for the app bootstrap to call after hydrating its own state.
			window.__bobbitPrepaint = __bobbitPrepaint;

			(function() {
				var rendered = function() {
					var app = document.getElementById("app");
					return !!app && app.getAttribute("data-rendered") === "true";
				};
				var showBanner = function(title, withReload) {
					if (rendered()) return;
					// Don't double-render if we already escalated.
					var existing = document.querySelector(".bobbit-watchdog");
					if (existing) existing.remove();
					var skeleton = document.querySelector("[data-bobbit-skeleton]");
					if (skeleton) skeleton.style.display = "none";
					var pill = document.querySelector("[data-bobbit-pill]");
					if (pill) pill.remove();
					var wrap = document.createElement("div");
					wrap.className = "bobbit-watchdog";
					var h = document.createElement("div");
					h.textContent = title;
					h.style.fontSize = "16px";
					wrap.appendChild(h);
					if (withReload) {
						var btn = document.createElement("button");
						btn.textContent = "Reload";
						btn.addEventListener("click", function() { location.reload(); });
						wrap.appendChild(btn);
					}
					document.body.appendChild(wrap);
				};
				// Soft 3s nudge: "Reconnecting…" + reload button.
				setTimeout(function() {
					if (rendered()) return;
					showBanner("Reconnecting…", true);
				}, 3000);
				// Hard 10s escalation: "Something went wrong".
				setTimeout(function() {
					if (rendered()) return;
					showBanner("Something went wrong", true);
				}, 10000);
				// Cleanup hook — once Lit has rendered (#app gets
				// data-rendered="true" from main.ts after the first renderApp())
				// hide the skeleton. The skeleton uses `position: fixed; inset: 0`
				// and would otherwise intercept pointer events on every page that
				// doesn't reach a WS-connected session (settings, workflow editor,
				// role manager, etc). data-connected is a stronger signal but it
				// only fires on session pages — not safe to gate the skeleton on.
				var observer = new MutationObserver(function() {
					var app = document.getElementById("app");
					if (!app) return;
					if (app.getAttribute("data-rendered") === "true") {
						var wd = document.querySelector(".bobbit-watchdog");
						if (wd) wd.remove();
						var sk = document.querySelector("[data-bobbit-skeleton]");
						if (sk) sk.classList.add("--hide");
						var pill = document.querySelector("[data-bobbit-pill]");
						if (pill) pill.remove();
						observer.disconnect();
					}
				});
				observer.observe(document.documentElement, { attributes: true, subtree: true, attributeFilter: ["data-rendered"] });
			})();
		</script>
		<script type="module" src="/src/app/main.ts"></script>
	</body>
</html>
